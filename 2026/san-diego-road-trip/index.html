    function dayScene(d){
        const t = DAY_THEME[d.id];
        const inner = (t && SCENES[t.scene]) ? SCENES[t.scene]() : topoSVG();
        return '<div class="hero-scene">' + inner + '</div><div class="hero-scrim"></div>';
    }
    function daySky(d){ const t = DAY_THEME[d.id]; return t ? t.sky : ('linear-gradient(135deg,'+d.accent+',var(--brand))'); }

    function estFuel(mpg, price){
        const gal = TOTAL_MI / mpg;
        return { gal: Math.round(gal), cost: Math.round(gal*price).toLocaleString(), range: Math.round(mpg*TANK_GAL), fills: Math.ceil(TOTAL_MI/(mpg*TANK_GAL)) };
    }

    function wireCalc(){
        const mpg = document.getElementById('mpg'), gas = document.getElementById('gas');
        if(!mpg) return;
        function upd(){
            const m = parseFloat(mpg.value), p = parseFloat(gas.value);
            document.getElementById('mpgVal').textContent = m + ' mpg';
            document.getElementById('gasVal').textContent = '$' + p.toFixed(2);
            const gal = TOTAL_MI / m;
            document.getElementById('outCost').textContent = '$' + Math.round(gal*p).toLocaleString();
            document.getElementById('outGal').textContent = Math.round(gal);
            document.getElementById('outFill').textContent = Math.ceil(TOTAL_MI/(m*TANK_GAL));
            document.getElementById('outRange').textContent = Math.round(m*TANK_GAL) + ' mi';
        }
        mpg.addEventListener('input', upd); gas.addEventListener('input', upd); upd();
    }

    /* ============================================================
       RENDER: a single day view
       ============================================================ */
    function buildDay(d){
        const view = el('<section class="view" id="view-'+d.id+'"></section>');
        view.style.setProperty('--accent', d.accent);
        view.style.setProperty('--accent-soft', d.soft);

        const elevChange = d.elevTo - d.elevFrom;
        const hero = el('<div class="hero">'
            + '<div class="hero-grad hero-scenic" style="background:'+daySky(d)+'">'
                + dayScene(d)
                + '<div class="hero-kicker">Day '+d.n+' of '+TRIP.days.length+' \u00B7 '+(d.seg==='ret'?'Return leg':'Outbound leg')+' \u00B7 '+fmtDate(dateForDay(d))+'</div>'
                + '<h2>'+d.from+' \u2192 '+d.to+'</h2>'
                + '<div class="hero-sub">'+d.title+'</div>'
                + '<div class="hero-stats">'
                    + hstat('Distance', d.distance, 'mi')
                    + hstat('Drive time', fmtDur(d.driveMin), '')
                    + hstat('Elevation', (elevChange<0?'\u2193':'\u2191')+Math.abs(elevChange).toLocaleString(), 'ft')
                    + hstat('Arrival', d.stops.find(s=>s.cat==='arrive') ? d.stops.find(s=>s.cat==='arrive').t.replace(/^0/,'') : '\u2014', '')
                + '</div>'
            + '</div>'
        + '</div>');
        view.appendChild(hero);

        // map
        const map = el('<div class="map-shell">'
            + '<div class="map-widget" id="map-'+d.id+'"></div>'
            + '<div class="map-legend" id="legend-'+d.id+'"></div>'
            + '<a class="map-cta" target="_blank" rel="noopener" href="'+gdir(d.dirParts)+'">Open in Google Maps \u2197</a>'
        + '</div>');
        view.appendChild(map);

        // embedded Google Maps route with the day's waypoints
        const rq = routeQList(d);
        view.appendChild(el('<div class="gmap-embed">'
            + '<div class="gmap-embed-head"><span>\uD83D\uDDFA\uFE0F Google Maps \u00B7 route &amp; '+rq.length+' waypoints</span>'
            + '<a target="_blank" rel="noopener" href="'+gdir(rq)+'">Open with stops \u2197</a></div>'
            + '<iframe loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="'+gembed(rq)+'"></iframe>'
        + '</div>'));

        // weather
        view.appendChild(el('<div class="weather-container"><a class="weatherwidget-io" href="'+d.weather.href+'" data-label_1="'+d.weather.l1+'" data-label_2="'+d.weather.l2+'" data-theme="pure" data-basecolor="#ffffff" data-textcolor="#1c1917">'+d.weather.l1+' '+d.weather.l2+'</a></div>'));

        // tabs
        view.appendChild(el('<div class="tab-bar">'
            + '<button class="tab-button active" data-pane="'+d.id+'-path">\uD83D\uDCCD Guided Path</button>'
            + '<button class="tab-button" data-pane="'+d.id+'-quests">\u2728 Side Quests</button>'
            + '<button class="tab-button" data-pane="'+d.id+'-lodging">\uD83D\uDECF\uFE0F Sleep Options</button>'
        + '</div>'));

        // PATH pane
        const path = el('<div class="tab-pane active" id="'+d.id+'-path"></div>');
        path.appendChild(el('<div class="safety"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z" stroke-linecap="round" stroke-linejoin="round"/></svg><div><b>Safety Protocol.</b> '+d.safety+'</div></div>'));
        const watch = DAY_WATCH[d.id];
        if(watch && watch.length){
            path.appendChild(el('<div class="watch-card"><div class="watch-title">\u26A0\uFE0F Watch for today</div><ul class="watch-list">'
                + watch.map(w=>'<li>'+w+'</li>').join('') + '</ul></div>'));
        }
        path.appendChild(skyCard(d));
        const sg = stargazeCard(d); if(sg) path.appendChild(sg);

        // time budget: pure driving + recommended time at stops
        const stopsMin = d.stops.reduce((a,s)=>a+stopAddMin(s),0);
        if(d.driveMin && stopsMin){
            path.appendChild(el('<div class="pace-note">\uD83D\uDD52 <b>'+fmtDur(d.driveMin)+'</b> rolling \u00B7 <b>~'+fmtMins(stopsMin)+'</b> recommended at stops \u00B7 \u2248 <b>'+fmtDur(d.driveMin+stopsMin)+'</b> door-to-door</div>'));
        }

        // filters
        const usedCats = [...new Set(d.stops.map(s=>s.cat))];
        const filters = el('<div class="filters"><span class="flabel">Filter</span></div>');
        usedCats.forEach(c=>{
            const chip = el('<button class="chip" data-cat="'+c+'" style="--cc:'+CATS[c].color+'"><span class="cd"></span>'+CATS[c].label+'</button>');
            chip.addEventListener('click', ()=>{ chip.classList.toggle('off'); applyFilter(d); });
            filters.appendChild(chip);
        });
        path.appendChild(filters);

        // timeline
        const tl = el('<div class="timeline" id="tl-'+d.id+'"></div>');
        d.stops.forEach((s,i)=>{ tl.appendChild(buildStop(d, s, i)); });
        path.appendChild(tl);
        const st = soundtrackCard(d); if(st) path.appendChild(st);
        view.appendChild(path);

        // SIDE QUESTS pane
        view.appendChild(questsPane(d));

        // LODGING pane
        const lod = el('<div class="tab-pane" id="'+d.id+'-lodging"></div>');
        d.lodging.forEach((l,i)=>{ lod.appendChild(buildLodge(l, d, i)); });
        view.appendChild(lod);

        // wire tabs
        view.querySelectorAll('.tab-button').forEach(btn=>{
            btn.addEventListener('click', ()=>{
                view.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active'));
                view.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
                btn.classList.add('active');
                view.querySelector('#'+btn.dataset.pane).classList.add('active');
                const m = maps[d.id]; if(m) setTimeout(()=>m.invalidateSize(), 60);
            });
        });

        return view;
    }

    function buildStop(d, s, i){
        const key = d.id + ':' + i;
        const done = isDone(key);
        const cat = CATS[s.cat];
        const sun = sunCalc(dateForDay(d), s.lat, s.lng, (s.tz != null ? s.tz : (d.tz != null ? d.tz : -7)));
        const golden = (s.cat === 'photo' || s.cat === 'activity')
            ? '<span class="golden-chip">\uD83C\uDF05 Golden ' + fmtClock(sun.goldenPMstart) + '\u2013' + fmtClock(sun.sunset) + '</span>' : '';
        const loreLine = s.lore ? '<div class="detail-note" style="border-left-color:var(--accent-soft)">\uD83D\uDCA1 ' + s.lore + '</div>' : '';
        const dwellMin = stopDwell(s), addMin = stopAddMin(s);
        const showStay = !(s.cat === 'depart' || s.cat === 'arrive' || s.cat === 'rest') && dwellMin > 0;
        const dwellChip = showStay ? '<span class="dwell-chip">\u23F1\uFE0F ~' + fmtMins(dwellMin) + '</span>' : '';
        const alertChip = s.alert ? '<span class="alert-chip" title="Heads-up">\u26A0\uFE0F Heads-up</span>' : '';
        const alertNote = s.alert ? '<div class="alert-note"><span class="an-ic">\u26A0\uFE0F</span><div>' + s.alert + '</div></div>' : '';
        const coffeeVibe = (s.cat === 'coffee' && s.vibe) ? '<div class="coffee-vibe">\u2615 ' + s.vibe + '</div>' : '';
        const parkChip = s.parking ? '<span class="park-chip" title="Cheapest parking">\uD83C\uDD7F\uFE0F Parking</span>' : '';
        const parkNote = s.parking ? '<div class="park-note"><span class="pn-ic">\uD83C\uDD7F\uFE0F</span><div><b>Cheapest parking.</b> ' + s.parking + '</div></div>' : '';
        const detourChip = (s.detour && s.detour > 0) ? '<span class="detour-chip" title="Off-route detour">\u21A9\uFE0F +' + fmtMins(s.detour) + ' detour</span>' : '';
        const detourNote = (s.detour && s.detour > 0) ? '<div class="detour-note">\u21A9\uFE0F <b>Detour stop:</b> ~' + fmtMins(s.detour) + ' of extra driving off the line \u00B7 ~' + fmtMins(s.detour + dwellMin) + ' round trip with the visit.</div>' : '';
        const row = el('<div class="leg" data-cat="'+s.cat+'" style="--lc:'+cat.color+'">'
            + '<div class="leg-dot" style="border-color:'+cat.color+'">'+cat.emoji+'</div>'
            + '<div class="stop-card'+(done?' checked':'')+(isConfirmed('stop-'+d.id+'-'+i)?' confirmed':'')+'">'
                + '<div class="stop-head">'
                    + '<div class="stop-check'+(done?' checked':'')+'" role="checkbox" aria-checked="'+done+'"><svg viewBox="0 0 24 24" fill="none" stroke-width="3.5"><path d="M5 12l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
                    + '<div class="stop-main">'
                        + '<div class="stop-row1">'
                            + '<span class="stop-time tnum">'+s.t+'</span>'
                            + '<span class="stop-title">'+s.title+'</span>'
                            + '<span class="tag '+s.cat+'">'+cat.label+'</span>'
                            + (s.leg ? '<span class="stop-leg-meta">'+s.leg+'</span>' : '')
                            + golden
                            + dwellChip
                            + alertChip
                            + parkChip
                            + detourChip
                        + '</div>'
                        + '<div class="stop-desc">'+s.desc+'</div>'
                        + '<div class="stop-detail">'
                            + '<div class="detail-grid">'
                                + detailCell('Leg', s.leg || '\u2014')
                                + detailCell('\u23F1\uFE0F Suggested stay', showStay ? fmtMins(dwellMin) : '\u2014')
                                + detailCell('\u2795 Adds to day', addMin > 0 ? ('~' + fmtMins(addMin) + (s.detour ? ' \u00B7 incl. detour' : '')) : '\u2014')
                                + detailCell('\uD83C\uDF05 Sunrise', fmtClock(sun.sunrise))
                                + detailCell('\uD83C\uDF06 Sunset', fmtClock(sun.sunset))
                                + detailCell('Coordinates', s.lat.toFixed(3)+', '+s.lng.toFixed(3))
                            + '</div>'
                            + (s.voice
                                ? '<div class="detail-note">\u201C'+s.detail+'\u201D</div>'
                                : '<p style="font-size:0.88rem;color:var(--dim);margin-top:13px">'+s.detail+'</p>')
                            + coffeeVibe
                            + alertNote
                            + parkNote
                            + detourNote
                            + loreLine
                            + '<div class="stop-links">'
                                + '<a class="mini-link" target="_blank" rel="noopener" href="'+gmaps(s.gmapsQ)+'">\uD83D\uDCCD Maps</a>'
                                + '<button class="mini-link" data-focus="'+i+'">\uD83C\uDFAF Show on map</button>'
                                + '<button class="confirm-btn'+(isConfirmed('stop-'+d.id+'-'+i)?' on':'')+'" data-confirm="stop-'+d.id+'-'+i+'"><span class="cf-tick">\u2713</span><span class="cf-label">'+(isConfirmed('stop-'+d.id+'-'+i)?'Confirmed':'Confirm')+'</span></button>'
                            + '</div>'
                        + '</div>'
                    + '</div>'
                + '</div>'
            + '</div>'
        + '</div>');

        const card = row.querySelector('.stop-card');
        const check = row.querySelector('.stop-check');
        addMagnet(card, 1.2, 0.05);

        // toggle open on card click (not on check / links)
        card.addEventListener('click', (e)=>{
            if(e.target.closest('.stop-check') || e.target.closest('a') || e.target.closest('[data-focus]') || e.target.closest('.confirm-btn')) return;
            card.classList.toggle('open');
        });
        check.addEventListener('click', (e)=>{
            e.stopPropagation();
            toggleDone(key);
            const nowDone = isDone(key);
            check.classList.toggle('checked', nowDone);
            check.setAttribute('aria-checked', nowDone);
            card.classList.toggle('checked', nowDone);
            refreshProgress();
        });
        const focusBtn = row.querySelector('[data-focus]');
        focusBtn.addEventListener('click', (e)=>{ e.stopPropagation(); focusMarker(d.id, i); });
        const cf = row.querySelector('.confirm-btn');
        cf.addEventListener('click', (e)=>{ e.stopPropagation(); toggleConfirm('stop-'+d.id+'-'+i); syncPlanUI(); });

        return row;
    }

    /* ============================================================
       RENDER: sky & light, stargazing, soundtrack, side quests
       ============================================================ */
    function daylightBar(sun, arrivalMin){
        const START = 240, END = 1320, span = END - START; // 4:00 to 22:00
        const pos = m => Math.max(0, Math.min(100, (m - START) / span * 100));
        const c = { night:'#1e293b', blue:'#6366f1', golden:'#f59e0b', day:'#bfdbfe' };
        const stops = [];
        const seg = (from, to, col) => { if(from==null||to==null||to<=from) return; stops.push(col+' '+pos(from).toFixed(1)+'%', col+' '+pos(to).toFixed(1)+'%'); };
        // build left-to-right
        seg(START, sun.dawn, c.night);
        seg(sun.dawn, sun.sunrise, c.blue);
        seg(sun.sunrise, sun.goldenAMend, c.golden);
        seg(sun.goldenAMend, sun.goldenPMstart, c.day);
        seg(sun.goldenPMstart, sun.sunset, c.golden);
        seg(sun.sunset, sun.dusk, c.blue);
        seg(sun.dusk, END, c.night);
        const grad = 'linear-gradient(90deg,' + stops.join(',') + ')';
        let arr = '';
        if(arrivalMin != null && arrivalMin >= START && arrivalMin <= END){
            arr = '<div class="arr" data-l="Arrive" style="left:' + pos(arrivalMin).toFixed(1) + '%"></div>';
        }
        return '<div class="daylight-bar"><div class="daylight-fill" style="background:' + grad + '"></div>' + arr + '</div>'
            + '<div class="daylight-scale"><span>4 AM</span><span>Noon</span><span>10 PM</span></div>';
    }

    function skyCard(d){
        const date = dateForDay(d);
        const dest = d.waypoints[d.waypoints.length - 1];
        const sun = sunCalc(date, dest[0], dest[1], d.tz);
        const arrive = d.stops.find(s => s.cat === 'arrive');
        const arriveMin = arrive ? parseClock(arrive.t) : null;
        const dl = sun.daylight != null ? (Math.floor(sun.daylight/60) + 'h ' + Math.round(sun.daylight%60) + 'm') : '\u2014';
        const card = el('<div class="card"><div class="card-title">\u2600\uFE0F Sky &amp; light \u00B7 ' + d.to + ' \u00B7 <span class="sky-date">' + fmtDate(date) + '</span></div>'
            + '<div class="sky-grid">'
                + skyCell('\uD83C\uDF05 Sunrise', fmtClock(sun.sunrise))
                + skyCell('\uD83C\uDF1E Golden AM', fmtClock(sun.sunrise) + '\u2013' + fmtClock(sun.goldenAMend))
                + skyCell('\u2600\uFE0F Solar noon', fmtClock(sun.solarNoon))
                + skyCell('\uD83C\uDF07 Golden PM', fmtClock(sun.goldenPMstart) + '\u2013' + fmtClock(sun.sunset))
                + skyCell('\uD83C\uDF06 Sunset', fmtClock(sun.sunset))
                + skyCell('\uD83C\uDF0C Daylight', dl)
            + '</div>'
            + daylightBar(sun, arriveMin)
        + '</div>');
        return card;
    }
    function skyCell(k, v){ return '<div class="sky-cell"><div class="k">' + k + '</div><div class="v tnum">' + v + '</div></div>'; }
    function parseClock(t){ // "03:30 PM" -> minutes
        const m = /(\d+):(\d+)\s*(AM|PM)/i.exec(t); if(!m) return null;
        let h = parseInt(m[1]) % 12; if(/pm/i.test(m[3])) h += 12;
        return h*60 + parseInt(m[2]);
    }

        if(!d.darkSky) return null;
        const night = dateForDay(d);

            + '<div class="sg-row">'
                + '<div class="sg-moon">' + moon.emoji + '</div>'
                + '<div class="sg-meta"><div class="k">Moon</div><div class="v">' + moon.name + ' \u00B7 ' + moon.illum + '% lit</div></div>'
                + '<div class="sg-meta"><div class="k">Stargazing</div><div class="v">' + q.word + '</div></div>'
            + '</div>'
            + '<div class="sg-note">' + q.note + ' ' + d.darkSky.note + '</div>'
        + '</div>');
    }

    function applyPoiFilter(){
        const si = document.getElementById('poiSearch');
        const q = (si ? si.value : '').toLowerCase().trim();
        const offCats = [...document.querySelectorAll('#poiCats .chip.off')].map(c=>c.dataset.cat);
        const offLegs = [...document.querySelectorAll('#poiLegs .chip.off')].map(c=>c.dataset.leg);
        const favOnly = !!document.querySelector('#poiLegs .chip[data-fav].on');
        let shown = 0;
        document.querySelectorAll('#poiGrid .poi-card').forEach(card=>{
            const id = card.dataset.id, p = poiById(id);
            const txt = (p.name + ' ' + p.blurb + ' ' + POI_CATS[p.cat].label).toLowerCase();
            const ok = !offCats.includes(card.dataset.cat) && !offLegs.includes(card.dataset.leg) && (!favOnly || isFav(id)) && (!q || txt.includes(q));
            card.classList.toggle('hidden', !ok); if(ok) shown++;
        });
        const cnt = document.getElementById('poiCount');
        if(cnt) cnt.textContent = shown + ' of ' + CATALOG.length + ' waypoints shown';
        if(discoverMarkers){
            CATALOG.forEach(p=>{
                const m = discoverMarkers[p.id]; if(!m) return;
                const txt = (p.name + ' ' + p.blurb).toLowerCase();
                const ok = !offCats.includes(p.cat) && !offLegs.includes(p.day) && (!favOnly || isFav(p.id)) && (!q || txt.includes(q));
                m.setOpacity(ok ? 1 : 0.15);
            });
        }
    }

    function planItemsForDay(d){
        const items = [];
        const decided = (d.lodging||[]).some(l=>l.status === 'decided');
        items.push({ id:'lodge-'+d.id, kind:'lodging', decided:decided,
            label: decided ? ('Lodging set \u2014 ' + d.to) : ('Confirm where you\u2019re sleeping in ' + d.to),
            detail:(d.lodging||[]).map(l=>l.name).join('  \u00B7  ') || 'No options shortlisted yet',
            q:(d.lodging && d.lodging[0]) ? d.lodging[0].gmapsQ : null });
        d.stops.forEach((s,i)=>{
            if(s.cat === 'food'){
                const needsRes = /reserv|book/i.test((s.leg||'') + ' ' + (s.detail||''));
                items.push({ id:'stop-'+d.id+'-'+i, kind:'meal',
                    label:(needsRes ? 'Reserve ' : 'Decide on ') + s.title + ' \u00B7 ' + d.to,
                    detail:s.desc, q:s.gmapsQ });
            }
        });
        (PLAN_EXTRA[d.id] || []).forEach((t,k)=> items.push({ id:'plan-'+d.id+'-'+k, kind:t.kind, label:t.label, detail:t.detail, q:t.q }));
        return items;
    }

    function planGroups(){
        const groups = [];
        groups.push({ key:'trip', title:'\uD83E\uDDED Trip-wide', accent:'#7c3aed',
            items:(PLAN_EXTRA.trip || []).map((t,k)=>({ id:'plan-trip-'+k, kind:t.kind, label:t.label, detail:t.detail, q:t.q })) });
        TRIP.days.forEach(d=> groups.push({ key:d.id, title:'Day '+d.n+' \u00B7 '+d.from+' \u2192 '+d.to, accent:d.accent, items:planItemsForDay(d) }));
        groups.forEach(g=>{
            g.items.forEach(it=> it.met = isConfirmed(it.id) || !!it.decided);
            plan.tasks.filter(t=>t.group===g.key).forEach(t=> g.items.push({ id:t.id, kind:'custom', label:t.label, detail:'', met:t.done, custom:true }));
        });
        return groups;
    }

    function planStats(){
        let met=0, total=0; const byGroup={};
        planGroups().forEach(g=>{ let gm=0; g.items.forEach(it=>{ total++; if(it.met){ met++; gm++; } }); byGroup[g.key] = { met:gm, total:g.items.length }; });
        return { met:met, total:total, open:total-met, byGroup:byGroup };
    }

    const maps = {};

    function markerIcon(cat, focused){
        const c = CATS[cat] ? CATS[cat].color : '#475569';
        return L.divIcon({
            className: 'stop-pin' + (focused ? ' focus' : ''),
            html: '<span style="--pc:'+c+'">' + (CATS[cat]?CATS[cat].emoji:'\u2022') + '</span>',
            iconSize: [28,28], iconAnchor: [14,26], popupAnchor: [0,-24]
        });

    function baseTiles(map){
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18
        }).addTo(map);
    }

    /* Draw a road-snapped route via OSRM when reachable; always fall back to a
       dashed great-circle polyline so a connecting line is guaranteed to render. */
    function addRoute(map, wps, color, weight){
        let drawn = false;
        const latlngs = wps.map(w => L.latLng(w[0], w[1]));
        function fallback(){
            if(drawn) return; drawn = true;
            L.polyline(latlngs, { color: color, weight: weight, opacity: 0.7, dashArray: '2 10', lineCap: 'round', lineJoin: 'round' }).addTo(map);
        }
        try {
            const ctrl = L.Routing.control({
                waypoints: latlngs,
                createMarker: ()=>null,
                routeWhileDragging: false, addWaypoints: false, show: false, fitSelectedRoutes: false,
                lineOptions: { styles: [{ color: color, opacity: 0.9, weight: weight }] }
            }).addTo(map);
            ctrl.on('routesfound', ()=>{ drawn = true; });
            ctrl.on('routingerror', fallback);
        } catch(e) { /* routing lib missing */ }
        setTimeout(fallback, 5000);
    }

    function initDayMap(d){
        const id = 'map-' + d.id;
        if(maps[d.id]) return;
        const node = document.getElementById(id);
        if(!node) return;
        const map = L.map(id, { zoomControl: true, scrollWheelZoom: false }).setView(d.waypoints[0], 6);
        baseTiles(map);

        addRoute(map, d.waypoints, d.accent, 5);

        // stop markers (skip pure rest at same coords as arrive to reduce overlap, but keep all for completeness)
        const seen = {};
        markersByDay[d.id] = {};
        d.stops.forEach((s,i)=>{
            const k = s.lat.toFixed(4)+','+s.lng.toFixed(4);
            // nudge overlapping markers slightly
            let lat = s.lat, lng = s.lng;
            if(seen[k]){ lat += 0.012*seen[k]; lng += 0.012*seen[k]; }
            seen[k] = (seen[k]||0)+1;
            const m = L.marker([lat,lng], { icon: markerIcon(s.cat,false) }).addTo(map);
            m.bindPopup('<div class="pop-time">'+s.t+'</div><div class="pop-t">'+s.title+'</div><div class="pop-d">'+s.desc+'</div>');
            m.on('click', ()=> highlightStop(d.id, i));
            markersByDay[d.id][i] = m;
        });

        // legend
        renderLegend('legend-'+d.id, [...new Set(d.stops.map(s=>s.cat))]);

        // fit
        const grp = L.featureGroup(Object.values(markersByDay[d.id]));
        map.fitBounds(grp.getBounds().pad(0.18));
        maps[d.id] = map;
    }

    function initOverviewMap(){
        if(maps.overview) return;
        const node = document.getElementById('map-overview');
        if(!node) return;
        const map = L.map('map-overview', { zoomControl: true, scrollWheelZoom: false }).setView([36.5,-112], 5);
        baseTiles(map);
        const all = [];
        TRIP.days.forEach(d=>{
            addRoute(map, d.waypoints, d.accent, 4.5);
            // endpoint markers
            const base = L.marker([d.waypoints[d.waypoints.length-1][0], d.waypoints[d.waypoints.length-1][1]], {
                icon: L.divIcon({ className:'stop-pin', html:'<span style="--pc:'+d.accent+'">'+d.n+'</span>', iconSize:[28,28], iconAnchor:[14,26], popupAnchor:[0,-24] })
            }).addTo(map);
            base.bindPopup('<div class="pop-time">Day '+d.n+'</div><div class="pop-t">'+d.to+'</div><div class="pop-d">'+d.from+' \u2192 '+d.to+' \u00B7 '+d.distance+' mi</div>');
            base.on('click', ()=> selectView(d.id));
            d.waypoints.forEach(w=>all.push(w));
        });
        // start marker
        L.marker(TRIP.days[0].waypoints[0], {
            icon: L.divIcon({ className:'stop-pin', html:'<span style="--pc:#1c1917">\uD83C\uDFE0</span>', iconSize:[28,28], iconAnchor:[14,26], popupAnchor:[0,-24] })
        }).addTo(map).bindPopup('<div class="pop-t">Start \u00B7 Colorado Springs</div>');
        map.fitBounds(L.latLngBounds(all).pad(0.12));
        renderLegend('legend-overview', ['day-routes']);
        document.getElementById('legend-overview').innerHTML =

    /* ---------- magnetic motion (honors reduced-motion) ---------- */
    const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function addMagnet(node, tiltMax, drift){
        if(REDUCED) return;
        let raf = null;
        node.style.transition = 'transform 0.18s cubic-bezier(0.2,0.7,0.2,1)';
        node.addEventListener('pointermove', (e)=>{
            const r = node.getBoundingClientRect();
            const px = (e.clientX - r.left)/r.width - 0.5;
            const py = (e.clientY - r.top)/r.height - 0.5;
            if(raf) cancelAnimationFrame(raf);
            raf = requestAnimationFrame(()=>{
                node.style.transform = 'perspective(700px) rotateX('+(-py*tiltMax)+'deg) rotateY('+(px*tiltMax)+'deg) translate('+(px*drift*30)+'px,'+(py*drift*30)+'px)';
            });
        });
        node.addEventListener('pointerleave', ()=>{ if(raf) cancelAnimationFrame(raf); node.style.transform = ''; });
    }

    function updateCountdown(){
        const numEl = document.getElementById('cdNum'), metaEl = document.getElementById('cdMeta');
        if(!numEl) return;
        const start = getTripStart(); start.setHours(8,0,0,0);
        // La Jolla is the outbound turnaround (last non-return day), NOT the final day home.
        const coastDay = TRIP.days.filter(d=> d.seg !== 'ret').slice(-1)[0] || TRIP.days[TRIP.days.length - 1];
        const coast = dateForDay(coastDay);
        const end = dateForDay(TRIP.days[TRIP.days.length - 1]);   // final day = back home
        const now = new Date();
        const ms = start - now;
        if(ms > 0){
            const days = Math.floor(ms / 86400000);
            const hrs = Math.floor((ms % 86400000) / 3600000);
            numEl.innerHTML = days + ' <small>days' + (days < 21 ? ', ' + hrs + ' hrs' : '') + '</small>';
            metaEl.innerHTML = 'Wheels up <b>' + fmtDate(getTripStart()) + '</b> at 8:00 AM \u00B7 reach La Jolla <b>' + fmtDate(coast) + '</b> \u00B7 home <b>' + fmtDate(end) + '</b>.';
        } else if(now <= new Date(end.getFullYear(), end.getMonth(), end.getDate(), 23, 59)){
            numEl.innerHTML = '\uD83D\uDE99 <small>en route</small>';
            metaEl.innerHTML = 'Expedition underway \u2014 home <b>' + fmtDate(end) + '</b>.';
        } else {
            numEl.innerHTML = '\u2713 <small>complete</small>';
            metaEl.innerHTML = 'Mountain to coast, fully logged. Safe travels home.';
        }
    }

    /* ============================================================
       UP NEXT  ·  live "discover upcoming places" from current location
       ============================================================ */
    const UP = { pos:null };
    function toRad(d){ return d * Math.PI / 180; }
    function haversineMi(aLat, aLng, bLat, bLng){
        const R = 3958.8, dLat = toRad(bLat - aLat), dLng = toRad(bLng - aLng);
        const s = Math.sin(dLat/2)**2 + Math.cos(toRad(aLat))*Math.cos(toRad(bLat))*Math.sin(dLng/2)**2;
        return 2 * R * Math.asin(Math.sqrt(s));
    }
    function compassDir(aLat, aLng, bLat, bLng){
        const y = Math.sin(toRad(bLng-aLng))*Math.cos(toRad(bLat));
        const x = Math.cos(toRad(aLat))*Math.sin(toRad(bLat)) - Math.sin(toRad(aLat))*Math.cos(toRad(bLat))*Math.cos(toRad(bLng-aLng));
        const brng = (Math.atan2(y, x)*180/Math.PI + 360) % 360;
        return ['N','NE','E','SE','S','SW','W','NW'][Math.round(brng/45) % 8];
    }
    function fmtMi(mi){ if(mi < 0.1) return 'here'; if(mi < 10) return mi.toFixed(1)+' mi'; return Math.round(mi)+' mi'; }
    function routeAnchors(){
        const out = [];
        TRIP.days.forEach((d, di)=> (d.stops || []).forEach((s, i)=> out.push({ di, dayId:d.id, dayN:d.n, dayTo:d.to, idx:i, title:s.title, cat:s.cat, lat:s.lat, lng:s.lng })));
        return out;
    }
    function upCandidates(){
        const own = (custom.own || []).filter(o=> o && typeof o.lat === 'number' && typeof o.lng === 'number' && o.day);
        return CATALOG.concat(own);
    }
    function computeUpNext(pos){
        const anchors = routeAnchors();
        let near = anchors[0], nd = Infinity;
        anchors.forEach(a=>{ const d = haversineMi(pos.lat, pos.lng, a.lat, a.lng); if(d < nd){ nd = d; near = a; } });
        const flatIdx = anchors.indexOf(near);
        const nextStop = anchors.slice(flatIdx+1).find(a=> a.cat !== 'rest') || null;
        let nextDest = anchors.slice(flatIdx+1).find(a=> a.cat === 'arrive') || anchors[anchors.length-1];
        const cand = upCandidates().map(p=>({ p, dIdx: TRIP.days.findIndex(d=> d.id === p.day), dist: haversineMi(pos.lat, pos.lng, p.lat, p.lng) }));
        const ahead = cand.filter(c=> c.dIdx >= near.di);
        const pool = (ahead.length >= 5 ? ahead : cand).slice();
        pool.sort((a, b)=> a.dist - b.dist);
        return { near, nearDist: nd, nextStop, nextDest, list: pool.slice(0, 12), pos };
    }
    function renderUpNext(ctx){
        const guess = document.getElementById('unGuess'), listEl = document.getElementById('unList');
        document.getElementById('unStatus').textContent = 'Located \u00B7 near ' + ctx.near.title + ' (' + fmtMi(ctx.nearDist) + ')';
        let gh = '';
        if(ctx.nextStop){
            const dir = compassDir(ctx.pos.lat, ctx.pos.lng, ctx.nextStop.lat, ctx.nextStop.lng);
            gh += '<div class="ug-row"><span class="ug-k">Next stop</span><b>'+ctx.nextStop.title+'</b><span class="ug-meta">'+fmtMi(haversineMi(ctx.pos.lat, ctx.pos.lng, ctx.nextStop.lat, ctx.nextStop.lng))+' '+dir+'</span></div>';
        }
        if(ctx.nextDest){
            const dir = compassDir(ctx.pos.lat, ctx.pos.lng, ctx.nextDest.lat, ctx.nextDest.lng);
            gh += '<div class="ug-row"><span class="ug-k">Heading to</span><b>'+(ctx.nextDest.dayTo || ctx.nextDest.title)+'</b><span class="ug-meta">'+fmtMi(haversineMi(ctx.pos.lat, ctx.pos.lng, ctx.nextDest.lat, ctx.nextDest.lng))+' '+dir+'</span></div>';
        }
        guess.innerHTML = gh; guess.hidden = !gh;
        listEl.innerHTML = '';
        if(!ctx.list.length){ listEl.appendChild(el('<div class="un-empty">No catalogued places ahead \u2014 you\u2019re near the finish line!</div>')); }
        else ctx.list.forEach(c=>{
            const p = c.p, cat = POI_CATS[p.cat] || { color:'#64748b', emoji:'\uD83D\uDCCD', label:'Place' };
            const dn = TRIP.days[c.dIdx] ? ('Day '+TRIP.days[c.dIdx].n) : '';
            const dayN = TRIP.days[c.dIdx] ? TRIP.days[c.dIdx].n : '';
            const fyPoi = ['scenic','park','hike','water'].includes(p.cat) || /coffee|roaster|caf[e\u00E9]/i.test(p.name + ' ' + (p.blurb || ''));
            const added = isAdded(p.day, p.id);
            const row = el('<div class="un-poi">'
                + '<div class="up-ic" style="background:'+cat.color+'22">'+cat.emoji+'</div>'
                + '<div style="flex:1;min-width:0">'
                    + '<h5>'+p.name+'</h5>'
                    + '<div class="up-tags"><span class="un-dist">'+fmtMi(c.dist)+'</span>'
                        + '<span class="tag" style="background:'+cat.color+'1f;color:'+cat.color+'">'+cat.label+'</span>'
                        + (dn ? '<span class="poi-leg">'+dn+'</span>' : '')
                        + '<span class="dwell-chip">\u23F1\uFE0F ~'+fmtMins(POI_DWELL[p.cat] || 30)+'</span>'
                        + (fyPoi ? '<span class="foryou-pill">\u2605 Your vibe</span>' : '')
                        + (function(){ const dt = detourNoteFor(p.lat, p.lng, p.day, POI_DWELL[p.cat]||30); return dt ? '<span class="detour-chip" title="~'+fmtMins(dt.drive)+' extra driving; ~'+fmtMins(dt.total)+' with the visit">\u21A9\uFE0F +'+fmtMins(dt.drive)+'</span>' : ''; })()
                        + (poiParking(p) ? '<span class="park-chip" title="Cheapest parking">\uD83C\uDD7F\uFE0F Parking</span>' : '')
                    + '</div>'
                    + '<div class="up-blurb">'+(p.blurb || '')+'</div>'
                    + '<div class="up-act">'
                        + '<button class="add-btn'+(added ? ' added' : '')+'" data-un-add="1">'+(added ? ('\u2713 Added to Day '+dayN) : '\uFF0B Add')+'</button>'
                        + '<a class="mini-link" target="_blank" rel="noopener" href="'+gmaps(p.q || p.name)+'">\uD83D\uDCCD Maps</a>'
                    + '</div>'
                + '</div>'
            + '</div>');
            row.querySelector('[data-un-add]').addEventListener('click', (e)=>{
                toggleAdded(p.day, p.id);
                if(typeof refreshCustomUI === 'function') refreshCustomUI();

                b.classList.toggle('added', now);
                b.textContent = now ? ('\u2713 Added to Day '+dayN) : '\uFF0B Add';
            });
            listEl.appendChild(row);
        });
        renderLiveInto(listEl);
    }
    function locateUpNext(force){
        const status = document.getElementById('unStatus');
        if(UP.pos && !force){ renderUpNext(computeUpNext(UP.pos)); return; }
        if(!navigator.geolocation){ status.textContent = 'Geolocation isn\u2019t available in this browser.'; return; }
        status.textContent = 'Locating you\u2026';
        navigator.geolocation.getCurrentPosition(
            (p)=>{ UP.pos = { lat:p.coords.latitude, lng:p.coords.longitude }; renderUpNext(computeUpNext(UP.pos)); },
            (err)=>{
                const a = routeAnchors()[0];
                UP.pos = { lat:a.lat, lng:a.lng };
                renderUpNext(computeUpNext(UP.pos));
                status.textContent = (err && err.code === 1)
                    ? 'Location blocked \u2014 showing from the trip start. Allow location & refresh for live results.'
                    : 'Couldn\u2019t get a fix \u2014 showing from the trip start.';
            },
            { enableHighAccuracy:false, timeout:9000, maximumAge:120000 }
        );
    }

        dr.classList.add('open'); dr.setAttribute('aria-hidden', 'false');
        document.getElementById('upnextScrim').classList.add('show');

    /* ============================================================
       LIVE EN-ROUTE DISCOVERY  ·  OpenStreetMap Overpass + Wikipedia
       Both are keyless & CORS-friendly. Candidates are filtered to the
       route corridor (reusing the detour polyline math) so only places
       genuinely *on the way* surface, then ranked by distance.
       ============================================================ */
    const LIVE = { state:'idle', items:null };
    const LIVE_OSM_RADIUS_M = 18000, LIVE_WIKI_RADIUS_M = 10000, LIVE_CORRIDOR_MI = 7, LIVE_MAX = 24;
    function liveCatFromTags(t){
        t = t || {};
        if(t.amenity === 'cafe' || t.amenity === 'restaurant') return 'food';
        if(t.leisure === 'park' || t.leisure === 'nature_reserve') return 'park';
        if(t.natural === 'waterfall' || t.natural === 'spring' || t.natural === 'hot_spring') return 'water';
        if(t.natural === 'peak' || t.natural === 'arch' || t.natural === 'cliff') return 'scenic';
        if(t.historic || t.tourism === 'museum') return 'history';
        if(t.tourism === 'artwork') return 'quirky';
        return 'scenic';
    }
    function osmLabel(t){
        t = t || {};
        if(t.tourism === 'viewpoint') return 'Viewpoint';
        if(t.natural === 'peak') return 'Peak' + (t.ele ? ' (' + Math.round(t.ele) + ' m)' : '');
        if(t.natural === 'waterfall') return 'Waterfall';
        if(t.natural === 'hot_spring' || t.natural === 'spring') return 'Spring';
        if(t.amenity === 'cafe') return 'Caf\u00E9';
        if(t.amenity === 'restaurant') return 'Restaurant' + (t.cuisine ? ' \u00B7 ' + String(t.cuisine).replace(/[_;]/g,' ') : '');
        if(t.leisure === 'park' || t.leisure === 'nature_reserve') return 'Park / reserve';
        if(t.tourism === 'attraction') return 'Attraction';
        if(t.tourism === 'museum') return 'Museum';
        if(t.historic) return 'Historic \u00B7 ' + String(t.historic).replace(/_/g,' ');
        return 'Place';
    }
    // Public Overpass instances are flaky/rate-limited & bot-protected; try a few in order.
    const OVERPASS_EPS = [
        'https://overpass-api.de/api/interpreter',
        'https://overpass.private.coffee/api/interpreter',
        'https://overpass.kumi.systems/api/interpreter'
    ];
    function overpassFetch(body, i){
        i = i || 0;
        if(i >= OVERPASS_EPS.length) return Promise.reject(new Error('overpass-all-down'));
        const ctrl = new AbortController(), to = setTimeout(()=> ctrl.abort(), 14000);
        return fetch(OVERPASS_EPS[i], { method:'POST', headers:{ 'Content-Type':'application/x-www-form-urlencoded' }, body:body, signal:ctrl.signal })
            .then(res=>{
                clearTimeout(to);
                const ct = res.headers.get('content-type') || '';
                if(!res.ok || ct.indexOf('json') === -1) throw new Error('overpass-' + res.status);
                return res.json();
            })
            .catch(err=>{ clearTimeout(to); return overpassFetch(body, i + 1); });
    }
    function fetchOverpass(lat, lng){
        const r = LIVE_OSM_RADIUS_M;
        const q = '[out:json][timeout:25];('
            + 'node(around:'+r+','+lat+','+lng+')[tourism~"^(viewpoint|attraction|artwork|museum|picnic_site)$"][name];'
            + 'node(around:'+r+','+lat+','+lng+')[natural~"^(peak|waterfall|spring|hot_spring|arch)$"][name];'
            + 'node(around:'+r+','+lat+','+lng+')[historic][name];'
            + 'node(around:'+r+','+lat+','+lng+')[leisure~"^(park|nature_reserve)$"][name];'
            + 'node(around:'+r+','+lat+','+lng+')[amenity~"^(cafe|restaurant)$"][name];'
            + ');out body 90;';
        return overpassFetch('data='+encodeURIComponent(q))
            .then(j=> (j.elements||[]).filter(e=> e.lat && e.lon && e.tags && e.tags.name).map(e=>({
                id:'live_osm_'+e.id, source:'osm', name:e.tags.name, lat:e.lat, lng:e.lon,
                cat:liveCatFromTags(e.tags), blurb:osmLabel(e.tags)+' \u00B7 OpenStreetMap', q:e.tags.name
            })));
    }
    function fetchWiki(lat, lng){
        const url = 'https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=geosearch&gscoord='
            + lat + '%7C' + lng + '&gsradius=' + LIVE_WIKI_RADIUS_M + '&gslimit=40';
        return fetch(url).then(res=>{ if(!res.ok) throw new Error('wiki'); return res.json(); })
            .then(j=> ((j.query && j.query.geosearch) || []).map(g=>({
                id:'live_wiki_'+g.pageid, source:'wiki', name:g.title, lat:g.lat, lng:g.lon,
                cat:'scenic', blurb:'Wikipedia article nearby', q:g.title, url:'https://en.wikipedia.org/?curid='+g.pageid
            })));
    }
    function dedupeLive(items){
        const out = [];
        items.forEach(it=>{
            const dup = out.find(o=> o.name.toLowerCase() === it.name.toLowerCase() || haversineMi(o.lat,o.lng,it.lat,it.lng) < 0.12);
            if(dup){ if(dup.source === 'wiki' && it.source === 'osm'){ dup.cat = it.cat; dup.blurb = it.blurb; dup.q = it.q; } return; }
            out.push(it);
        });
        return out;
    }
    function minRouteOff(lat, lng){
        let best = Infinity;
        TRIP.days.forEach(d=>{ const o = distToPolylineMi(lat, lng, d.waypoints); if(o < best) best = o; });
        return best;
    }
    function guessDayId(lat, lng){
        let best = TRIP.days[0].id, bd = Infinity;
        TRIP.days.forEach(d=>{ const o = distToPolylineMi(lat, lng, d.waypoints); if(o < bd){ bd = o; best = d.id; } });
        return best;
    }
    function addLivePlace(pl){
        custom.own = custom.own || [];
        if(custom.own.some(o=> o.id === pl.id)) return false;
        custom.own.push({ id:pl.id, name:pl.name, day:guessDayId(pl.lat,pl.lng), cat:pl.cat, blurb:pl.blurb || 'Discovered en route.', q:pl.q || pl.name, lat:pl.lat, lng:pl.lng, own:true, source:pl.source });
        saveCustom();
        return true;
    }
    function rerenderUpNext(){ if(UP.pos) renderUpNext(computeUpNext(UP.pos)); }
    function scanLive(){
        if(!UP.pos) return;
        const center = UP.pos;
        LIVE.state = 'loading'; rerenderUpNext();
        Promise.allSettled([fetchOverpass(center.lat, center.lng), fetchWiki(center.lat, center.lng)]).then(rs=>{
            let items = [];
            rs.forEach(r=>{ if(r.status === 'fulfilled') items = items.concat(r.value); });
            items.forEach(it=>{ it.dist = haversineMi(center.lat, center.lng, it.lat, it.lng); it.off = minRouteOff(it.lat, it.lng); });
            items = dedupeLive(items.filter(it=> it.off <= LIVE_CORRIDOR_MI)).sort((a,b)=> a.dist - b.dist).slice(0, LIVE_MAX);
            LIVE.items = items;
            if(rs.every(r=> r.status === 'rejected')) LIVE.state = 'error';
            else LIVE.state = items.length ? 'done' : 'empty';
            rerenderUpNext();
        });
    }
    function renderLiveInto(listEl){
        listEl.appendChild(el('<div class="live-divider">\u2728 Live along your route</div>'));
        if(LIVE.state === 'idle'){ listEl.appendChild(el('<div class="live-note">Tap <b>\u2728 Scan live</b> to pull free nearby places from OpenStreetMap + Wikipedia along your corridor.</div>')); return; }
        if(LIVE.state === 'loading'){ listEl.appendChild(el('<div class="live-note">Scanning OpenStreetMap + Wikipedia\u2026</div>')); return; }
        if(LIVE.state === 'error'){ listEl.appendChild(el('<div class="live-note err">Couldn\u2019t reach the live sources \u2014 try again in a moment.</div>')); return; }
        if(LIVE.state === 'empty'){ listEl.appendChild(el('<div class="live-note">No live places found right on this stretch of route.</div>')); return; }
        LIVE.items.forEach(pl=>{
            const cat = POI_CATS[pl.cat] || { color:'#64748b', emoji:'\uD83D\uDCCD', label:'Place' };
            const added = (custom.own || []).some(o=> o.id === pl.id);
            const dt = detourNoteFor(pl.lat, pl.lng, guessDayId(pl.lat, pl.lng), POI_DWELL[pl.cat] || 30);
            const mapHref = pl.url || gmaps(pl.q || pl.name);
            const row = el('<div class="un-poi">'
                + '<div class="up-ic" style="background:'+cat.color+'22">'+cat.emoji+'</div>'
                + '<div style="flex:1;min-width:0">'
                    + '<h5>'+pl.name+'</h5>'
                    + '<div class="up-tags"><span class="un-dist">'+fmtMi(pl.dist)+'</span>'
                        + '<span class="src-badge '+(pl.source === 'osm' ? 'osm' : 'wiki')+'">'+(pl.source === 'osm' ? 'OSM' : 'Wikipedia')+'</span>'
                        + '<span class="tag" style="background:'+cat.color+'1f;color:'+cat.color+'">'+cat.label+'</span>'
                        + (dt ? '<span class="detour-chip" title="~'+fmtMins(dt.drive)+' extra driving">\u21A9\uFE0F +'+fmtMins(dt.drive)+'</span>' : '')
                    + '</div>'
                    + '<div class="up-blurb">'+(pl.blurb || '')+'</div>'
                    + '<div class="up-act">'
                        + '<button class="add-btn'+(added ? ' added' : '')+'" data-live-add="1">'+(added ? '\u2713 Added' : '\uFF0B Add to trip')+'</button>'
                        + '<a class="mini-link" target="_blank" rel="noopener" href="'+mapHref+'">'+(pl.source === 'wiki' ? '\uD83D\uDCD6 Wiki' : '\uD83D\uDCCD Maps')+'</a>'
                    + '</div>'
                + '</div>'
            + '</div>');
            row.querySelector('[data-live-add]').addEventListener('click', (e)=>{
                const ok = addLivePlace(pl);
                const b = e.currentTarget; b.classList.add('added'); b.textContent = '\u2713 Added';
                if(ok && typeof refreshCustomUI === 'function') refreshCustomUI();
            });
            listEl.appendChild(row);
        });
    }

    /* ============================================================
       STATE SYNC CORE  ·  one JSON snapshot of all stores.
       Powers: export file, share-link, and Google Drive sync.
       Strategy: last-write-wins on the whole snapshot via updatedAt.
       ============================================================ */
    const SYNC_VERSION = 1;
    const SYNC_STAMP_KEY = 'sd-sync-stamp-v1';
    const STORE_KEYS = {
        start:    'sd-trip-start-v1',
        nights:   'sd-sd-nights-v1',
        custom:   'sd-custom-v1',
        progress: 'sd-expedition-progress-v1',
        plan:     'sd-planning-v1',
        unified:  'sd.unified'
    };
    function touchSync(){
        try { localStorage.setItem(SYNC_STAMP_KEY, String(Date.now())); } catch(e){}
        try { document.dispatchEvent(new Event('trip:changed')); } catch(e){}
    }
    function syncStamp(){ var v; try { v = parseInt(localStorage.getItem(SYNC_STAMP_KEY), 10); } catch(e){} return isNaN(v) ? 0 : v; }
    function serializeState(){
        var data = {};
        for(var k in STORE_KEYS){ var v = null; try { v = localStorage.getItem(STORE_KEYS[k]); } catch(e){} if(v != null) data[k] = v; }
        return { app:'sd-roadtrip', v:SYNC_VERSION, updatedAt: syncStamp() || Date.now(), data:data };
    }
    function applyState(snap){
        if(!snap || !snap.data) return false;
        for(var k in STORE_KEYS){
            if(Object.prototype.hasOwnProperty.call(snap.data, k) && snap.data[k] != null){
                try { localStorage.setItem(STORE_KEYS[k], snap.data[k]); } catch(e){}
            }
        }
        try { localStorage.setItem(SYNC_STAMP_KEY, String(snap.updatedAt || Date.now())); } catch(e){}
        return true;
    }
    // URL-safe base64 (unicode aware) for share links
    function b64encode(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
    function b64decode(s){ s = s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length % 4) s += '='; return decodeURIComponent(escape(atob(s))); }

    function exportBackup(){
        var json = JSON.stringify(serializeState(), null, 2);
        var blob = new Blob([json], { type:'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'san-diego-trip-' + isoDate(new Date()) + '.json';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    }
    function importBackupFile(file){
        var r = new FileReader();
        r.onload = function(){
            var snap = null; try { snap = JSON.parse(r.result); } catch(e){}
            if(!snap || snap.app !== 'sd-roadtrip'){ alert('That file doesn\u2019t look like a saved trip plan.'); return; }
            if(!confirm('Restore this trip plan? It replaces what\u2019s saved on this device.')) return;
            applyState(snap); location.reload();
        };
        r.readAsText(file);
    }
    function buildShareLink(){ return location.origin + location.pathname + location.search + '#trip=' + b64encode(JSON.stringify(serializeState())); }
    function copyShareLink(){
        var link = buildShareLink();
        if(navigator.clipboard && navigator.clipboard.writeText){
            return navigator.clipboard.writeText(link).then(function(){ return true; }).catch(function(){ window.prompt('Copy this link:', link); return false; });
        }
        window.prompt('Copy this link:', link); return Promise.resolve(false);
    }
    function maybeImportFromHash(){
        var m = (location.hash || '').match(/^#trip=(.+)$/);
        if(!m) return false;
        var snap = null; try { snap = JSON.parse(b64decode(m[1])); } catch(e){}
        var valid = !!(snap && snap.app === 'sd-roadtrip');
        if(valid && confirm('Load this shared trip plan? It replaces what\u2019s saved on this device.')){
            applyState(snap);
            try { history.replaceState(null, '', location.pathname + location.search); } catch(e){}
            location.reload(); return true;
        }
        try { history.replaceState(null, '', location.pathname + location.search); } catch(e){}
        return false;
    }
    function setupSync(){
        var wrap = document.getElementById('syncWrap'), btn = document.getElementById('syncBtn'), menu = document.getElementById('syncMenu');
        if(!wrap || !btn || !menu) return;
        function close(){ menu.hidden = true; btn.setAttribute('aria-expanded','false'); }
        btn.addEventListener('click', function(e){ e.stopPropagation(); var open = menu.hidden; menu.hidden = !open; btn.setAttribute('aria-expanded', open ? 'true' : 'false'); });
        document.addEventListener('click', function(e){ if(!wrap.contains(e.target)) close(); });
        document.getElementById('syncExport').addEventListener('click', function(){ exportBackup(); close(); });
        var fileInput = document.getElementById('syncFile');
        document.getElementById('syncImport').addEventListener('click', function(){ fileInput.click(); });
        fileInput.addEventListener('change', function(){ if(fileInput.files[0]) importBackupFile(fileInput.files[0]); });
        document.getElementById('syncShare').addEventListener('click', function(){
            var el = this;
            copyShareLink().then(function(ok){ el.textContent = ok ? '\uD83D\uDD17  Link copied to clipboard' : '\uD83D\uDD17  Copy share link'; setTimeout(function(){ el.textContent = '\uD83D\uDD17  Copy share link'; }, 1800); });
        });
        document.getElementById('syncDrive').addEventListener('click', function(){ if(window.TripDrive) window.TripDrive.connect(); });
        // Drive module updates this to reflect connection state
        window.__syncStatus = function(state, label, extra){
            extra = extra || {};
            var dot = document.getElementById('syncDot'), lab = document.getElementById('syncLabel'), driveBtn = document.getElementById('syncDrive'), note = document.getElementById('syncNote');
            if(dot) dot.className = 'sync-dot' + (state === 'on' ? ' on' : state === 'busy' ? ' busy' : state === 'err' ? ' err' : '');
            if(lab && label) lab.textContent = label;
            if(driveBtn && extra.drive) driveBtn.textContent = extra.drive;
            if(note && extra.note) note.textContent = extra.note;
        };
    }
    window.TripSync = { serialize: serializeState, applyState: applyState, snapshotString: function(){ return JSON.stringify(serializeState()); }, stamp: syncStamp, touch: touchSync };

    function boot(){
        if(maybeImportFromHash()) return;   // shared link adopted → reloads
        mergeExtras();
        renderNav();
        renderContent();
        selectView('overview');
        setupSync();

        // weather widget loader
        !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');

        // departure date control
        const dateInput = document.getElementById('tripStart');
        dateInput.value = isoDate(getTripStart());
        dateInput.addEventListener('change', ()=>{
            if(dateInput.value){ setTripStart(dateInput.value); rebuild(); }
        });
        const nightsInput = document.getElementById('sdNights');
        if(nightsInput){
            nightsInput.value = getNights();
            nightsInput.addEventListener('change', ()=>{ setNights(nightsInput.value); nightsInput.value = getNights(); rebuild(); });
        }
        setInterval(updateCountdown, 60000);

        // header controls
        document.getElementById('resetBtn').addEventListener('click', ()=>{
            if(confirm('Reset all logged stops, prep and gear checks?')){
                progress = {}; saveProgress();
                document.querySelectorAll('.stop-check').forEach(c=>c.classList.remove('checked'));
                document.querySelectorAll('.stop-card').forEach(c=>c.classList.remove('checked'));
                document.querySelectorAll('.check-item').forEach(c=>c.classList.remove('checked'));
                refreshProgress();
            }
        });
        document.getElementById('navToggle').addEventListener('click', openNavMobile);
        document.getElementById('scrim').addEventListener('click', closeNavMobile);

        // always-on: discover upcoming places
        document.getElementById('upnextFab').addEventListener('click', openUpNext);
        document.getElementById('unClose').addEventListener('click', closeUpNext);
        document.getElementById('upnextScrim').addEventListener('click', closeUpNext);
        document.getElementById('unRefresh').addEventListener('click', ()=> locateUpNext(true));
        document.getElementById('unScan').addEventListener('click', ()=>{ if(!UP.pos){ locateUpNext(false); } scanLive(); });
        document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeUpNext(); });

        // keyboard: arrow keys move between legs
        const order = ['overview', 'discover', 'planning', ...TRIP.days.map(d=>d.id)];
        document.addEventListener('keydown', (e)=>{
            if(e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;
            const idx = order.indexOf(currentView);
            if(e.key==='ArrowRight' && idx < order.length-1) selectView(order[idx+1]);
            if(e.key==='ArrowLeft' && idx > 0) selectView(order[idx-1]);
        });
    }

    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
    </script>

    <script>
    /* ============================================================
       UNIFIED DESIGN  ·  feature-flag plumbing + floating toggle
       (?unified=1 sticky to localStorage; body.unified is the kill switch)
       ============================================================ */
    (function () {
        'use strict';
        var STORAGE_KEY = 'sd.unified';
        var REDUCED = (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);

        function readFlag() {
            var p = new URLSearchParams(location.search);
            if (p.has('unified')) {
                var v = p.get('unified');
                try { localStorage.setItem(STORAGE_KEY, v === '1' ? '1' : '0'); } catch (_e) {}
                return v === '1';
            }
            try { return localStorage.getItem(STORAGE_KEY) === '1'; } catch (_e) { return false; }
        }
        function applyFlag(on) {
            document.body.classList.toggle('unified', !!on);
            if (typeof window.__rerenderOnUnifiedToggle === 'function') window.__rerenderOnUnifiedToggle();
            var btn = document.getElementById('uFlagToggle');
            if (btn) {
                btn.setAttribute('aria-pressed', on ? 'true' : 'false');
                btn.querySelector('.u-flag-label').textContent = on ? 'journey mode \u00B7 on' : 'journey mode \u00B7 off';
            }
        }
        function persist(on) { try { localStorage.setItem(STORAGE_KEY, on ? '1' : '0'); } catch (_e) {} }
        function bindMagnetic(el) {
            if (REDUCED || el.__uMagnetBound) return;
            el.__uMagnetBound = true;
            var tiltMax = parseFloat(el.dataset.magnetTilt || '4');
            var translateScale = parseFloat(el.dataset.magnetTranslate || '0.18');
            var strength = parseFloat(el.dataset.magnetStrength || '0.15');
            var raf = 0, latest = null;
            function paint() {
                raf = 0;
                if (!latest || !document.body.classList.contains('unified')) { el.style.transform = ''; return; }
                var r = el.getBoundingClientRect();
                var dx = latest.x - (r.left + r.width / 2), dy = latest.y - (r.top + r.height / 2);
                el.style.transform = 'perspective(1000px) rotateX(' + ((-dy / r.height) * tiltMax).toFixed(2) + 'deg) rotateY(' + ((dx / r.width) * tiltMax).toFixed(2) + 'deg) translate3d(' + (dx * translateScale * strength * 3.5).toFixed(1) + 'px,' + (dy * translateScale * strength * 3.5).toFixed(1) + 'px,0)';
            }
            el.addEventListener('mousemove', function (e) { latest = { x: e.clientX, y: e.clientY }; if (!raf) raf = requestAnimationFrame(paint); });
            el.addEventListener('mouseleave', function () { latest = null; el.style.transform = ''; });
        }
        window.__uBindMagnets = function (root) { (root || document).querySelectorAll('.u-magnet').forEach(bindMagnetic); };
        function mountToggle() {
            if (document.getElementById('uFlagToggle')) return;
            var btn = document.createElement('button');
            btn.id = 'uFlagToggle';
            btn.className = 'u-flag-toggle';
            btn.type = 'button';
            btn.setAttribute('aria-label', 'Toggle unified design');
            btn.innerHTML = '<span class="u-flag-dot"></span><span class="u-flag-label">journey mode \u00B7 off</span>';
            btn.addEventListener('click', function () {
                var on = !document.body.classList.contains('unified');
                applyFlag(on); persist(on);
            });
            document.body.appendChild(btn);
        }
        mountToggle();
        applyFlag(readFlag());
        window.__uBindMagnets(document);
    })();
    </script>

    <script>
    /* ============================================================
       GOOGLE DRIVE SYNC  ·  appDataFolder, client-side OAuth (GIS)
       --------------------------------------------------------------
       ONE-TIME SETUP (personal Gmail is fine):
         1. console.cloud.google.com → create a project (free)
         2. Enable the "Google Drive API"
         3. APIs & Services → Credentials → Create OAuth client ID
            → type: Web application
         4. Add this page's origin to "Authorized JavaScript origins"
            (your GitHub Pages origin + http://localhost:<port> for testing)
         5. OAuth consent screen → add scope .../auth/drive.appdata,
            add yourself (+ companions) as Test users
         6. Paste the client ID into CLIENT_ID below, reload, click "Sign in to sync"
       The client ID is public by design — there is no secret to leak.
       Trip state lives in a hidden, app-private folder in the user's own Drive.
       ============================================================ */
    (function () {
        'use strict';
        var CLIENT_ID = '633600620158-jsgj4pghqhpdd2909c39tcmppmgo5haa.apps.googleusercontent.com';
        var SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
        var FILE_NAME = 'trip-state.json';
        var FLAG = 'sd-drive-on';
        var token = null, tokenClient = null, gisLoaded = false, fileId = null, debounce = 0;

        function configured(){ return CLIENT_ID.indexOf('__PASTE') !== 0; }
        function status(state, label, extra){ if (window.__syncStatus) window.__syncStatus(state, label, extra || {}); }
        function authHeader(){ return { 'Authorization': 'Bearer ' + token }; }

        function loadGis(cb){
            if (gisLoaded && window.google && google.accounts && google.accounts.oauth2) { cb(); return; }
            var s = document.getElementById('gis-script');
            function ready(){ gisLoaded = true; cb(); }
            if (s) { s.addEventListener('load', ready); return; }
            s = document.createElement('script');
            s.id = 'gis-script'; s.src = 'https://accounts.google.com/gsi/client'; s.async = true; s.defer = true;
            s.onload = ready;
            s.onerror = function(){ status('err', 'Save', { drive: '☁️  Drive unavailable (offline?)' }); };
            document.head.appendChild(s);
        }
        function initTokenClient(){
            if (tokenClient) return;
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPE,
                callback: function (resp){
                    if (resp && resp.access_token) { token = resp.access_token; onAuthed(); }
                    else status('err', 'Save', { drive: '☁️  Sign-in failed — retry' });
                }
            });
        }
        function requestToken(silent){
            initTokenClient();
            status('busy', 'Connecting…');
            try { tokenClient.requestAccessToken({ prompt: silent ? '' : 'consent' }); }
            catch (e) { status('err', 'Save'); }
        }
        function findFile(){
            return fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id)&q=' + encodeURIComponent("name='" + FILE_NAME + "'"), { headers: authHeader() })
                .then(function (r){ return r.json(); })
                .then(function (j){ var f = j.files && j.files[0]; fileId = f ? f.id : null; return f || null; });
        }
        function download(id){
            return fetch('https://www.googleapis.com/drive/v3/files/' + id + '?alt=media', { headers: authHeader() }).then(function (r){ return r.json(); });
        }
        function upload(snapStr){
            if (fileId){
                return fetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=media', {
                    method: 'PATCH', headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()), body: snapStr });
            }
            var boundary = '----trip' + Date.now();
            var meta = { name: FILE_NAME, parents: ['appDataFolder'] };
            var body = '--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(meta) +
                '\r\n--' + boundary + '\r\nContent-Type: application/json\r\n\r\n' + snapStr + '\r\n--' + boundary + '--';
            return fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
                method: 'POST', headers: Object.assign({ 'Content-Type': 'multipart/related; boundary=' + boundary }, authHeader()), body: body })
                .then(function (r){ return r.json(); }).then(function (j){ if (j.id) fileId = j.id; return j; });
        }
        function pushLocal(){
            if (!token || !window.TripSync) return Promise.resolve();
            status('busy', 'Saving…');
            return upload(window.TripSync.snapshotString())
                .then(function(){ status('on', 'Synced', { drive: '☁️  Disconnect Drive', note: 'Synced to your Google Drive (appData).' }); })
                .catch(function(){ status('err', 'Save', { drive: '☁️  Sync failed — retry' }); });
        }
        function onAuthed(){
            try { localStorage.setItem(FLAG, '1'); } catch (e){}
            status('busy', 'Syncing…');
            findFile().then(function (f){
                if (!f) return pushLocal();
                return download(fileId).then(function (remote){
                    var local = window.TripSync ? window.TripSync.stamp() : 0;
                    var rstamp = remote && remote.updatedAt ? remote.updatedAt : 0;
                    if (remote && remote.app === 'sd-roadtrip' && rstamp > local){
                        window.TripSync.applyState(remote); location.reload();   // remote newer → adopt
                    } else {
                        return pushLocal();                                       // local newer/equal → push
                    }
                });
            }).catch(function(){ status('err', 'Save', { drive: '☁️  Sync failed — retry' }); });
        }
        function connect(){
            if (!configured()){
                alert('Google Drive sync needs a one-time setup:\n\n' +
                      '1. console.cloud.google.com → create a project\n' +
                      '2. Enable the Google Drive API\n' +
                      '3. Credentials → Create OAuth client ID → Web application\n' +
                      '4. Add this origin to Authorized JavaScript origins:\n     ' + location.origin + '\n' +
                      '5. Add scope .../auth/drive.appdata + yourself as a Test user\n' +
                      '6. Paste the client ID into CLIENT_ID in index.html, reload\n\n' +
                      'The client ID is public — there is no secret to leak.');
                return;
            }
            loadGis(function(){ requestToken(false); });
        }
        function disconnect(){
            token = null; fileId = null;
            try { localStorage.removeItem(FLAG); } catch (e){}
            status('idle', 'Save', { drive: '☁️  Sign in to sync', note: 'Saved only in this browser until you connect Drive.' });
        }
        document.addEventListener('trip:changed', function(){
            if (!token) return;
            clearTimeout(debounce);
            debounce = setTimeout(pushLocal, 1500);
        });
        window.TripDrive = { connect: function(){ if (token) disconnect(); else connect(); }, configured: configured };

        function autoReconnect(){
            var on = false; try { on = localStorage.getItem(FLAG) === '1'; } catch (e){}
            if (on && configured()) loadGis(function(){ requestToken(true); });
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', autoReconnect); else autoReconnect();
    })();
    </script>
