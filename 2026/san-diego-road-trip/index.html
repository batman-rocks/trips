<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain to Coast Expedition · Colorado Springs → La Jolla</title>
    <meta name="description" content="A guided 4-day overland expedition from Colorado Springs to La Jolla — scenic pull-outs, artisanal coffee, fuel logistics and golden-hour photo stops.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <style>
        :root {
            /* base */
            --bg:        #f5f3ee;
            --bg-2:      #efece4;
            --surface:   #ffffff;
            --ink:       #1c1917;
            --dim:       #57534e;
            --faint:     #8b8680;
            --rule:      rgba(28,25,23,0.08);
            --rule-2:    rgba(28,25,23,0.14);

            /* brand thread — the single color that means "active / done / on-track" */
            --brand:     #c2410c;
            --brand-2:   #ea580c;
            --brand-soft: rgba(234,88,12,0.12);
            --brand-wash: rgba(234,88,12,0.06);

            --good:      #15803d;
            --warn:      #b91c1c;

            /* per-day ambient accent (set on .day-view) */
            --accent:    #c2410c;
            --accent-soft: rgba(194,65,12,0.10);

            --radius:    18px;
            --radius-sm: 12px;

            --glass-bg:     rgba(255,255,255,0.72);
            --glass-border: 1px solid rgba(28,25,23,0.07);
            --glass-blur:   blur(18px) saturate(170%);
            --shadow-sm: 0 1px 2px rgba(28,25,23,0.05), 0 4px 14px -8px rgba(28,25,23,0.18);
            --shadow:    0 10px 34px -14px rgba(28,25,23,0.30), 0 2px 8px -4px rgba(28,25,23,0.12);

            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --serif: 'Newsreader', 'Iowan Old Style', Georgia, serif;

            /* ---- unified app aesthetic tokens (active under body.unified) ---- */
            --u-ink: #1a1330; --u-dim: #5b5673; --u-faint: #8e89a3;
            --u-rule: rgba(26,19,48,0.08); --u-rule-2: rgba(26,19,48,0.16);
            --u-brand: #b45309; --u-brand-soft: rgba(252,217,167,0.32); --u-brand-wash: rgba(254,243,226,0.55);
            --u-warn: #dc2626; --u-good: #059669;
            --u-accent: #0284c7; --u-accent-soft: rgba(2,132,199,0.10);
            --u-glass-bg: rgba(255,255,255,0.80);
            --u-glass-border: 1px solid rgba(26,19,48,0.06);
            --u-glass-blur: blur(20px) saturate(160%);
            --u-glass-shadow: 0 8px 32px rgba(26,19,48,0.08), 0 2px 6px rgba(26,19,48,0.04), inset 0 1px 0 rgba(255,255,255,0.8);
            --u-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Text', 'Segoe UI', sans-serif;
            --u-serif: 'ET Book', 'Charter', 'Iowan Old Style', Georgia, serif;

            /* ---- travel-centric skin (active under body.unified) ---- */
            --t-route: #b45309;                    /* the single trail thread */
            --t-route-soft: rgba(180,83,9,0.22);
            --t-stamp: #be123c;                    /* passport-stamp accent */
            --t-board-bg: #14213d;                 /* split-flap departure board */
            --t-board-ink: #fcd34d;                /* amber flap text */
            --t-paper: #fbf7ef;                    /* ticket paper */
            --t-contour: rgba(180,83,9,0.10);      /* topo contour ink */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; }

        body {
            font-family: var(--sans);
            background:
                radial-gradient(1100px 600px at 88% -8%, var(--accent-soft), transparent 60%),
                radial-gradient(900px 500px at -5% 110%, rgba(2,132,199,0.05), transparent 55%),
                var(--bg);
            color: var(--ink);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            overflow: hidden;
            transition: background 0.6s ease;
        }
        .tnum { font-variant-numeric: tabular-nums; }

        /* ---------- top command bar (the one glass surface) ---------- */
        .command-bar {
            position: relative;
            z-index: 30;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 22px;
            padding: 14px 26px;
            background: var(--glass-bg);
            -webkit-backdrop-filter: var(--glass-blur);
            backdrop-filter: var(--glass-blur);
            border-bottom: var(--glass-border);
            box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 24px -16px rgba(28,25,23,0.4);
        }
        .brand-mark {
            display: flex; align-items: center; gap: 13px; min-width: 0;
        }
        .compass {
            width: 38px; height: 38px; flex-shrink: 0; border-radius: 11px;
            display: grid; place-items: center;
            background: linear-gradient(140deg, var(--accent), var(--brand));
            color: #fff; box-shadow: var(--shadow-sm);
            transition: background 0.6s ease;
        }
        .compass svg { width: 21px; height: 21px; }
        .brand-text h1 { font-size: 1.04rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
        .brand-text p { font-size: 0.74rem; color: var(--faint); font-weight: 500; letter-spacing: 0.02em; }

        .command-spacer { flex: 1; }

        .progress-cluster { display: flex; align-items: center; gap: 14px; }
        .ring-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
        .ring-wrap svg { transform: rotate(-90deg); }
        .ring-label {
            position: absolute; inset: 0; display: grid; place-items: center;
            font-size: 0.72rem; font-weight: 800; letter-spacing: -0.02em;
        }
        .progress-meta { line-height: 1.25; }
        .progress-meta .k { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); font-weight: 700; }
        .progress-meta .v { font-size: 0.86rem; font-weight: 600; }

        .ghost-btn {
            font-family: var(--sans); font-size: 0.74rem; font-weight: 600;
            color: var(--dim); background: transparent;
            border: 1px solid var(--rule-2); border-radius: 9px;
            padding: 8px 12px; cursor: pointer; transition: all 0.18s ease;
            white-space: nowrap;
        }
        .ghost-btn:hover { color: var(--brand); border-color: var(--brand); background: var(--brand-wash); }

        /* ---------- workspace ---------- */
        .workspace { display: flex; flex: 1; overflow: hidden; min-height: 0; }

        .left-nav {
            width: 312px; flex-shrink: 0;
            border-right: 1px solid var(--rule);
            background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0));
            overflow-y: auto;
            padding: 18px 14px 30px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .nav-label {
            padding: 10px 14px 6px; font-size: 0.66rem; text-transform: uppercase;
            letter-spacing: 0.12em; font-weight: 800; color: var(--faint);
        }
        .nav-item {
            position: relative; cursor: pointer; border-radius: 14px;
            padding: 13px 15px; border: 1px solid transparent;
            transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
            display: flex; align-items: center; gap: 13px;
            will-change: transform;
        }
        .nav-item:hover { background: rgba(255,255,255,0.7); }
        .nav-item.active { background: var(--surface); border-color: var(--rule); box-shadow: var(--shadow-sm); }
        .nav-item.active::before {
            content: ''; position: absolute; left: -14px; top: 14px; bottom: 14px; width: 4px;
            border-radius: 0 4px 4px 0; background: var(--ni-accent, var(--brand));
        }
        .nav-index {
            width: 30px; height: 30px; flex-shrink: 0; border-radius: 9px;
            display: grid; place-items: center; font-size: 0.78rem; font-weight: 800;
            background: var(--ni-soft, var(--bg-2)); color: var(--ni-accent, var(--dim));
            border: 1px solid var(--rule);
        }
        .nav-item.done .nav-index { background: var(--brand); color: #fff; border-color: var(--brand); }
        .nav-body { flex: 1; min-width: 0; }
        .nav-body h3 { font-size: 0.9rem; font-weight: 700; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-body p { font-size: 0.74rem; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-spark { width: 54px; height: 26px; flex-shrink: 0; opacity: 0.85; }

        .nav-progress { height: 3px; border-radius: 3px; background: var(--rule); margin-top: 8px; overflow: hidden; }
        .nav-progress i { display: block; height: 100%; background: var(--brand); border-radius: 3px; transition: width 0.4s ease; }

        /* ---------- content ---------- */
        .content-panel { flex: 1; overflow-y: auto; padding: 30px 40px 64px; scroll-behavior: smooth; }
        .view { display: none; max-width: 980px; margin: 0 auto; animation: rise 0.4s cubic-bezier(0.2,0.7,0.2,1); }
        .view.active { display: block; }
        @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

        /* hero */
        .hero { position: relative; overflow: hidden; border-radius: var(--radius); margin-bottom: 26px; box-shadow: var(--shadow); }
        .hero-grad {
            padding: 30px 32px 26px; color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, var(--brand) 92%);
            position: relative;
        }
        .hero-topo { position: absolute; inset: 0; opacity: 0.16; pointer-events: none; mix-blend-mode: soft-light; }
        .hero-scenic { isolation: isolate; }
        .hero-scene { position: absolute; left: 0; right: 0; bottom: 0; height: 70%; min-height: 160px; pointer-events: none; overflow: hidden; z-index: 0; }
        .hero-scene .scene-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
        .hero-scrim { position: absolute; inset: 0; pointer-events: none; z-index: 0; background: linear-gradient(105deg, rgba(0,0,0,0.36) 0%, rgba(0,0,0,0.14) 44%, rgba(0,0,0,0) 72%), linear-gradient(0deg, rgba(0,0,0,0.18), rgba(0,0,0,0) 42%); }
        .hero-scenic > .hero-kicker, .hero-scenic > h2, .hero-scenic > .hero-sub, .hero-scenic > .hero-stats { position: relative; z-index: 1; }
        .hero-kicker { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.16em; font-weight: 800; opacity: 0.85; }
        .hero h2 { font-size: clamp(1.7rem, 3.4vw, 2.5rem); font-weight: 900; letter-spacing: -0.035em; line-height: 1.04; margin: 8px 0 4px; position: relative; }
        .hero-sub { font-size: 0.95rem; opacity: 0.9; font-weight: 500; position: relative; }
        .hero-stats { display: flex; flex-wrap: wrap; gap: 26px; margin-top: 22px; position: relative; }
        .hstat .k { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.78; font-weight: 700; }
        .hstat .v { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
        .hstat .v small { font-size: 0.8rem; font-weight: 600; opacity: 0.8; }

        /* elevation strip inside hero */
        .hero-elev { position: relative; height: 64px; background: rgba(0,0,0,0.12); }
        .hero-elev svg { width: 100%; height: 100%; display: block; }
        .hero-elev .elabel { position: absolute; bottom: 6px; font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.92); letter-spacing: 0.02em; }

        /* generic card */
        .card {
            background: var(--surface); border-radius: var(--radius);
            border: 1px solid var(--rule); box-shadow: var(--shadow-sm);
            padding: 26px; margin-bottom: 22px;
        }
        .card-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: var(--faint); margin-bottom: 16px; display: flex; align-items: center; gap: 9px; }

        /* map */
        .map-shell { position: relative; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--rule); box-shadow: var(--shadow-sm); margin-bottom: 22px; }
        .map-widget { width: 100%; height: 360px; background: #e7e5e0; }
        .leaflet-routing-container { display: none !important; }
        .map-cta {
            position: absolute; bottom: 16px; right: 16px; z-index: 600;
            display: inline-flex; align-items: center; gap: 7px;
            background: var(--ink); color: #fff; padding: 9px 16px; border-radius: 30px;
            text-decoration: none; font-size: 0.8rem; font-weight: 600;
            box-shadow: 0 6px 18px -6px rgba(0,0,0,0.5); transition: all 0.2s;
        }
        .map-cta:hover { background: var(--brand); transform: translateY(-2px); }
        .gmap-embed { border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 22px; background: #fff; }
        .gmap-embed-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 11px 15px; font-size: 0.82rem; font-weight: 700; color: var(--ink); border-bottom: 1px solid var(--rule); background: var(--bg-2); }
        .gmap-embed-head a { font-size: 0.72rem; font-weight: 800; color: var(--brand); text-decoration: none; white-space: nowrap; }
        .gmap-embed-head a:hover { text-decoration: underline; }
        .gmap-embed iframe { width: 100%; height: 420px; border: 0; display: block; }
        @media (max-width: 640px) { .gmap-embed iframe { height: 320px; } }
        .map-legend {
            position: absolute; top: 14px; left: 14px; z-index: 600;
            background: var(--glass-bg); -webkit-backdrop-filter: var(--glass-blur); backdrop-filter: var(--glass-blur);
            border: var(--glass-border); border-radius: 12px; padding: 9px 12px;
            display: flex; flex-direction: column; gap: 5px; box-shadow: var(--shadow-sm);
            font-size: 0.7rem; font-weight: 600; color: var(--dim);
        }
        .map-legend .lg { display: flex; align-items: center; gap: 7px; }
        .map-legend .dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--rule-2); }

        /* leaflet stop pins */
        .stop-pin span {
            display: grid; place-items: center; width: 28px; height: 28px; border-radius: 50% 50% 50% 2px;
            background: #fff; border: 2px solid var(--pc); font-size: 14px; transform: rotate(0deg);
            box-shadow: 0 4px 10px -3px rgba(0,0,0,0.5); transition: transform 0.15s ease;
        }
        .stop-pin.focus span { transform: scale(1.28); z-index: 1000; }
        .leaflet-popup-content-wrapper { border-radius: 12px; }
        .leaflet-popup-content { margin: 12px 14px; font-family: var(--sans); }
        .pop-t { font-weight: 700; font-size: 0.92rem; }
        .pop-time { font-size: 0.72rem; color: var(--brand); font-weight: 700; letter-spacing: 0.03em; }
        .pop-d { font-size: 0.8rem; color: var(--dim); margin-top: 4px; }

        /* weather */
        .weather-container { margin-bottom: 22px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--rule); background: var(--surface); }

        /* tabs */
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-button {
            font-family: var(--sans); padding: 9px 17px; background: var(--surface);
            border: 1px solid var(--rule-2); border-radius: 30px; font-size: 0.84rem; font-weight: 600;
            color: var(--dim); cursor: pointer; transition: all 0.18s ease;
        }
        .tab-button:hover { color: var(--ink); border-color: var(--ink); }
        .tab-button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
        .tab-pane { display: none; animation: rise 0.3s ease; }
        .tab-pane.active { display: block; }

        /* filter chips */
        .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; align-items: center; }
        .filters .flabel { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: var(--faint); margin-right: 2px; }
        .chip {
            font-family: var(--sans); font-size: 0.76rem; font-weight: 600; cursor: pointer;
            padding: 6px 12px; border-radius: 30px; border: 1px solid var(--rule-2);
            background: var(--surface); color: var(--dim); transition: all 0.16s ease;
            display: inline-flex; align-items: center; gap: 6px; user-select: none;
        }
        .chip .cd { width: 8px; height: 8px; border-radius: 50%; background: var(--cc, var(--dim)); }
        .chip:hover { border-color: var(--ink); color: var(--ink); }
        .chip.off { opacity: 0.4; }
        .chip.off .cd { background: var(--faint); }

        /* timeline */
        .timeline { position: relative; }
        .leg {
            position: relative; padding: 0 0 4px 34px; margin-bottom: 14px;
            border-left: 2px solid var(--rule-2); transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .leg:last-child { border-left-color: transparent; }
        .leg.hidden { display: none; }
        .leg-dot {
            position: absolute; left: -10px; top: 4px; width: 18px; height: 18px; border-radius: 50%;
            background: #fff; border: 2px solid var(--lc, var(--brand)); display: grid; place-items: center;
            font-size: 9px; z-index: 2; transition: all 0.2s ease;
        }
        .stop-card {
            background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius-sm);
            padding: 15px 16px; box-shadow: var(--shadow-sm); transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
            cursor: pointer; will-change: transform;
        }
        .stop-card:hover { border-color: var(--lc, var(--brand)); }
        .stop-card.open { border-color: var(--lc, var(--brand)); box-shadow: var(--shadow); }
        .stop-head { display: flex; align-items: flex-start; gap: 12px; }
        .stop-check {
            width: 22px; height: 22px; flex-shrink: 0; margin-top: 1px; border-radius: 7px;
            border: 2px solid var(--rule-2); background: var(--surface); cursor: pointer;
            display: grid; place-items: center; transition: all 0.18s ease;
        }
        .stop-check:hover { border-color: var(--brand); }
        .stop-check.checked { background: var(--brand); border-color: var(--brand); }
        .stop-check svg { width: 13px; height: 13px; stroke: #fff; opacity: 0; transition: opacity 0.15s; }
        .stop-check.checked svg { opacity: 1; }
        .stop-main { flex: 1; min-width: 0; }
        .stop-row1 { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .stop-time { font-size: 0.76rem; font-weight: 800; color: var(--ink); letter-spacing: 0.02em; min-width: 70px; }
        .stop-title { font-size: 1.02rem; font-weight: 700; letter-spacing: -0.01em; }
        .stop-card.checked .stop-title { color: var(--faint); text-decoration: line-through; text-decoration-color: var(--rule-2); }
        .stop-leg-meta { font-size: 0.72rem; color: var(--faint); font-weight: 600; }
        .stop-desc { font-size: 0.9rem; color: var(--dim); margin-top: 5px; }
        .stop-detail {
            margin-top: 0; max-height: 0; overflow: hidden; opacity: 0;
            transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s ease;
        }
        .stop-card.open .stop-detail { max-height: 420px; opacity: 1; margin-top: 13px; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; padding-top: 13px; border-top: 1px dashed var(--rule-2); }
        .detail-cell .k { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); font-weight: 800; }
        .detail-cell .v { font-size: 0.86rem; font-weight: 600; margin-top: 1px; }
        .detail-note { font-family: var(--serif); font-size: 1rem; line-height: 1.5; color: var(--dim); font-style: italic; margin-top: 13px; padding-left: 14px; border-left: 3px solid var(--accent-soft); }
        .stop-links { display: flex; gap: 8px; margin-top: 13px; flex-wrap: wrap; }
        .mini-link {
            font-size: 0.74rem; font-weight: 600; text-decoration: none; color: var(--ink);
            border: 1px solid var(--rule-2); border-radius: 8px; padding: 6px 11px;
            display: inline-flex; align-items: center; gap: 6px; transition: all 0.16s;
        }
        .mini-link:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-wash); }

        /* ---------- discover / waypoints ---------- */
        .nav-badge { background: var(--brand); color: #fff; font-size: 0.6rem; font-weight: 800; border-radius: 20px; padding: 1px 7px; vertical-align: middle; align-items: center; }
        .nav-date { font-size: 0.68rem; font-weight: 700; color: var(--ni-accent, var(--faint)); font-variant-numeric: tabular-nums; margin: 3px 0 2px; opacity: 0.85; }
        .discover-controls { display: flex; flex-direction: column; gap: 13px; margin-bottom: 20px; }
        .search-box { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--rule-2); border-radius: 12px; padding: 11px 15px; box-shadow: var(--shadow-sm); }
        .search-box input { border: none; outline: none; font-family: var(--sans); font-size: 0.95rem; width: 100%; background: transparent; color: var(--ink); }
        .search-box svg { width: 18px; height: 18px; color: var(--faint); flex-shrink: 0; }
        .poi-count { font-size: 0.76rem; color: var(--faint); font-weight: 800; font-variant: all-small-caps; letter-spacing: 0.05em; margin-bottom: 14px; }
        .poi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 14px; margin-bottom: 28px; }
        .poi-card { display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow-sm); transition: border-color 0.16s; }
        .poi-card.hidden { display: none; }
        .poi-card:hover { border-color: var(--brand); }
        .poi-head { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 9px; }
        .poi-ic { width: 38px; height: 38px; border-radius: 11px; display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
        .poi-title { flex: 1; min-width: 0; }
        .poi-title h4 { font-size: 0.97rem; font-weight: 700; line-height: 1.22; }
        .poi-tags { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
        .poi-leg { font-size: 0.58rem; font-weight: 800; font-variant: all-small-caps; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 20px; background: var(--bg-2); color: var(--dim); }
        .poi-fav { background: none; border: none; cursor: pointer; font-size: 1.15rem; line-height: 1; color: var(--faint); padding: 2px; transition: transform 0.15s, color 0.15s; flex-shrink: 0; }
        .poi-fav.on { color: #f59e0b; }
        .poi-fav:hover { transform: scale(1.2); }
        .poi-blurb { font-size: 0.85rem; color: var(--dim); flex: 1; line-height: 1.5; }
        .poi-actions { display: flex; gap: 8px; margin-top: 13px; align-items: stretch; }
        .add-btn { flex: 1; font-family: var(--sans); font-size: 0.78rem; font-weight: 700; cursor: pointer; border: 1px solid var(--brand); color: var(--brand); background: var(--brand-wash); border-radius: 9px; padding: 8px 12px; transition: all 0.16s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .add-btn:hover { background: var(--brand); color: #fff; }
        .add-btn.added { background: var(--brand); color: #fff; }
        .poi-actions .mini-link { font-size: 0.95rem; padding: 6px 10px; }
        .added-wrap { margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--rule-2); }
        .sq-sub { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--faint); font-weight: 800; margin-bottom: 14px; }
        .added-empty { font-size: 0.85rem; color: var(--faint); font-style: italic; line-height: 1.5; }
        .added-card { display: flex; align-items: flex-start; gap: 12px; background: var(--accent-soft); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 13px 14px; margin-bottom: 10px; }
        .added-card .ac-main { flex: 1; min-width: 0; }
        .added-card h4 { font-size: 0.93rem; font-weight: 700; }
        .added-card p { font-size: 0.82rem; color: var(--dim); margin-top: 3px; line-height: 1.45; }
        .remove-btn { background: none; border: 1px solid var(--rule-2); border-radius: 8px; cursor: pointer; color: var(--warn, #b91c1c); font-weight: 700; font-size: 0.72rem; padding: 6px 11px; transition: all 0.16s; flex-shrink: 0; }
        .remove-btn:hover { background: var(--warn, #b91c1c); color: #fff; border-color: var(--warn, #b91c1c); }
        .addown-form { display: grid; gap: 11px; grid-template-columns: 1fr 1fr; margin-top: 6px; }
        .addown-form .full { grid-column: 1 / -1; }
        .addown-form input, .addown-form select { font-family: var(--sans); font-size: 0.88rem; padding: 10px 12px; border: 1px solid var(--rule-2); border-radius: 9px; background: var(--surface); color: var(--ink); width: 100%; }
        .addown-form button { font-family: var(--sans); font-weight: 700; font-size: 0.9rem; background: var(--ink); color: #fff; border: none; border-radius: 9px; padding: 12px; cursor: pointer; transition: background 0.16s; }
        .addown-form button:hover { background: var(--brand); }

        /* ---------- confirm button (stops + lodging) ---------- */
        .confirm-btn { font-family: var(--sans); font-size: 0.74rem; font-weight: 700; cursor: pointer; border: 1px solid #15803d; color: #15803d; background: rgba(21,128,61,0.07); border-radius: 8px; padding: 6px 11px; display: inline-flex; align-items: center; gap: 6px; transition: all 0.16s; }
        .confirm-btn .cf-tick { font-size: 0.8rem; opacity: 0.65; }
        .confirm-btn:hover { background: rgba(21,128,61,0.16); }
        .confirm-btn.on { background: #15803d; color: #fff; border-color: #15803d; }
        .confirm-btn.on .cf-tick { opacity: 1; }
        .lodge-choose { border-color: var(--brand); color: var(--brand); background: var(--brand-wash); }
        .lodge-choose:hover { background: rgba(234,88,12,0.14); }
        .lodge-choose.on { background: #15803d; color: #fff; border-color: #15803d; }
        .stop-card.confirmed { box-shadow: inset 3px 0 0 #15803d, var(--shadow-sm); }
        .lodge-card.confirmed { border-color: #15803d; box-shadow: 0 0 0 1px #15803d, var(--shadow-sm); }

        /* ---------- planning view ---------- */
        .plan-ready { display: flex; flex-direction: column; gap: 16px; }
        .pr-top { display: flex; align-items: center; gap: 18px; }
        .pr-ring { width: 64px; height: 64px; flex-shrink: 0; }
        .pr-pct { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em; color: var(--ink); line-height: 1; }
        .pr-sub { font-size: 0.88rem; color: var(--dim); margin-top: 5px; }
        .pr-sub b { color: var(--ink); }
        .pr-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .pr-chip { font-size: 0.74rem; font-weight: 700; padding: 5px 11px; border-radius: 20px; background: var(--bg-2); color: var(--dim); border: 1px solid transparent; display: inline-flex; gap: 6px; align-items: center; }
        .pr-chip b { color: var(--ink); font-variant-numeric: tabular-nums; }
        .pr-chip.done { background: rgba(21,128,61,0.1); color: #15803d; border-color: rgba(21,128,61,0.25); }
        .pr-chip.done b { color: #15803d; }
        .plan-group { margin-top: 16px; }
        .pg-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .pg-head h3 { font-size: 1.02rem; font-weight: 800; }
        .pg-count { font-size: 0.68rem; font-weight: 800; font-variant: all-small-caps; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; background: rgba(180,83,9,0.12); color: #b45309; white-space: nowrap; }
        .pg-count.clear { background: rgba(21,128,61,0.12); color: #15803d; }
        .pg-list { display: flex; flex-direction: column; gap: 9px; }
        .plan-row { display: flex; align-items: flex-start; gap: 12px; padding: 13px 14px; border: 1px solid var(--rule); border-radius: var(--radius-sm); background: var(--surface); transition: opacity 0.16s, background 0.16s; }
        .plan-row.met { opacity: 0.62; background: var(--bg-2); }
        .plan-row.met .plan-main h4 { text-decoration: line-through; text-decoration-color: var(--faint); }
        .pr-check { flex-shrink: 0; width: 24px; height: 24px; border-radius: 7px; border: 2px solid var(--rule-2); background: var(--surface); cursor: pointer; display: grid; place-items: center; padding: 0; transition: all 0.16s; margin-top: 1px; }
        .pr-check svg { width: 13px; height: 13px; stroke: #fff; opacity: 0; transition: opacity 0.12s; }
        .pr-check:hover { border-color: #15803d; }
        .pr-check.on { background: #15803d; border-color: #15803d; }
        .pr-check.on svg { opacity: 1; }
        .plan-ic { width: 34px; height: 34px; flex-shrink: 0; border-radius: 9px; display: grid; place-items: center; font-size: 16px; }
        .plan-main { flex: 1; min-width: 0; }
        .plan-main h4 { font-size: 0.93rem; font-weight: 700; line-height: 1.3; }
        .plan-main p { font-size: 0.83rem; color: var(--dim); margin-top: 4px; line-height: 1.45; }
        .plan-main .stop-links { margin-top: 9px; }
        .plan-kind { flex-shrink: 0; font-size: 0.6rem; font-weight: 800; font-variant: all-small-caps; letter-spacing: 0.06em; align-self: flex-start; margin-top: 3px; }
        .pg-add { display: flex; gap: 9px; margin-top: 14px; }
        .pg-add input { flex: 1; font-family: var(--sans); font-size: 0.86rem; padding: 9px 12px; border: 1px solid var(--rule-2); border-radius: 9px; background: var(--surface); color: var(--ink); }
        .pg-add button { font-family: var(--sans); font-weight: 700; font-size: 0.82rem; background: var(--ink); color: #fff; border: none; border-radius: 9px; padding: 9px 18px; cursor: pointer; transition: background 0.16s; }
        .pg-add button:hover { background: var(--brand); }

        /* tags */
        .tag { font-size: 0.62rem; padding: 3px 9px; border-radius: 20px; font-weight: 800; font-variant: all-small-caps; letter-spacing: 0.06em; white-space: nowrap; }
        .tag.coffee { background: #fef3c7; color: #b45309; }
        .tag.photo  { background: #e0f2fe; color: #0369a1; }
        .tag.food   { background: #ffe4e6; color: #be123c; }
        .tag.fuel   { background: #dcfce7; color: #15803d; }
        .tag.activity { background: #cffafe; color: #0e7490; }
        .tag.depart { background: #e2e8f0; color: #334155; }
        .tag.arrive { background: #ede9fe; color: #6d28d9; }
        .tag.rest   { background: #f1f5f9; color: #475569; }
        .tag.lodging { background: #f5f5f4; color: #44403c; }
        .tag.decided { background: var(--ink); color: #fff; }
        .tag.consider { background: var(--brand); color: #fff; }

        /* safety */
        .safety {
            display: flex; gap: 12px; align-items: flex-start;
            background: linear-gradient(0deg, #fff7ed, #fffbf5); border: 1px solid #fed7aa;
            border-left: 4px solid var(--brand-2); padding: 14px 18px; border-radius: var(--radius-sm);
            margin-bottom: 20px; font-size: 0.9rem; color: #7c2d12;
        }
        .safety svg { width: 19px; height: 19px; flex-shrink: 0; margin-top: 1px; color: var(--brand-2); }
        .safety b { color: #7c2d12; }

        /* lodging */
        .lodge-card { padding: 0; overflow: hidden; }
        .lodge-banner { height: 190px; position: relative; }
        .lodge-banner img { width: 100%; height: 100%; object-fit: cover; }
        .lodge-banner.grad { background: linear-gradient(135deg, var(--accent), var(--brand)); }
        .lodge-banner .badge { position: absolute; top: 14px; right: 14px; }
        .lodge-body { padding: 20px 22px 22px; }
        .lodge-body h3 { font-size: 1.18rem; font-weight: 800; letter-spacing: -0.02em; }
        .lodge-body p { color: var(--dim); font-size: 0.9rem; margin-top: 7px; }
        .lodge-meta { display: flex; gap: 18px; margin-top: 14px; flex-wrap: wrap; }
        .lodge-meta .k { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); font-weight: 800; }
        .lodge-meta .v { font-size: 0.86rem; font-weight: 700; }

        /* overview specifics */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin-bottom: 22px; }
        .stat-tile {
            background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius-sm);
            padding: 18px 18px; box-shadow: var(--shadow-sm); transition: transform 0.18s ease, box-shadow 0.18s ease; will-change: transform;
        }
        .stat-tile .k { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--faint); font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .stat-tile .v { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.03em; margin-top: 6px; line-height: 1; }
        .stat-tile .v small { font-size: 0.78rem; font-weight: 700; color: var(--dim); }

        .calc-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .calc-row label { font-size: 0.78rem; font-weight: 700; color: var(--dim); width: 124px; flex-shrink: 0; }
        .calc-row input[type=range] { flex: 1; accent-color: var(--brand); }
        .calc-row .val { width: 86px; text-align: right; font-weight: 800; font-size: 0.92rem; }
        .calc-out { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 14px; margin-top: 18px; padding-top: 18px; border-top: 1px dashed var(--rule-2); }
        .calc-out .k { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); font-weight: 800; }
        .calc-out .v { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; color: var(--brand); }

        .check-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 9px; }
        .check-item {
            display: flex; align-items: center; gap: 11px; padding: 11px 13px;
            border: 1px solid var(--rule); border-radius: var(--radius-sm); background: var(--surface);
            cursor: pointer; transition: all 0.16s ease;
        }
        .check-item:hover { border-color: var(--brand); }
        .check-item.checked { background: var(--brand-wash); border-color: var(--brand-soft); }
        .check-item .stop-check { margin-top: 0; }
        .check-item .ci-label { font-size: 0.88rem; font-weight: 600; }
        .check-item.checked .ci-label { color: var(--faint); text-decoration: line-through; text-decoration-color: var(--rule-2); }
        .check-item .ci-sub { font-size: 0.72rem; color: var(--faint); }

        .legend-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.84rem; font-weight: 600; color: var(--dim); }
        .legend-item .lc { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center; font-size: 13px; border: 1px solid var(--rule); }

        .overview-elev { width: 100%; height: 150px; }
        .overview-elev svg { width: 100%; height: 100%; }

        /* day-route chips on overview */
        .route-rail { display: flex; flex-direction: column; gap: 0; }
        .route-leg { display: flex; align-items: center; gap: 14px; padding: 14px 4px; border-bottom: 1px solid var(--rule); cursor: pointer; transition: background 0.16s; border-radius: 8px; }
        .route-leg:last-child { border-bottom: none; }
        .route-leg:hover { background: var(--bg-2); }
        .route-leg .rl-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .route-leg .rl-body { flex: 1; min-width: 0; }
        .route-leg .rl-body b { font-size: 0.92rem; font-weight: 700; }
        .route-leg .rl-body span { font-size: 0.78rem; color: var(--faint); }
        .route-leg .rl-stat { text-align: right; }
        .route-leg .rl-stat b { font-size: 0.9rem; font-weight: 800; }
        .route-leg .rl-stat span { display: block; font-size: 0.68rem; color: var(--faint); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }

        /* date control */
        .date-control { display: flex; align-items: center; gap: 9px; }
        .date-control label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 800; color: var(--faint); }
        .date-control input { font-family: var(--sans); font-size: 0.8rem; font-weight: 600; color: var(--ink); border: 1px solid var(--rule-2); border-radius: 9px; padding: 7px 10px; background: var(--surface); cursor: pointer; }
        .date-control input:hover { border-color: var(--brand); }

        /* sky & light */
        .sky-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 14px; margin-bottom: 14px; }
        .sky-cell .k { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); font-weight: 800; display: flex; align-items: center; gap: 5px; }
        .sky-cell .v { font-size: 1.04rem; font-weight: 800; letter-spacing: -0.01em; margin-top: 2px; }
        .daylight-bar { position: relative; height: 28px; border-radius: 8px; overflow: visible; border: 1px solid var(--rule); margin-top: 22px; }
        .daylight-fill { position: absolute; inset: 0; border-radius: 7px; }
        .daylight-bar .arr { position: absolute; top: -5px; bottom: -5px; width: 2px; background: var(--ink); border-radius: 2px; }
        .daylight-bar .arr::after { content: attr(data-l); position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 0.56rem; font-weight: 800; color: var(--ink); white-space: nowrap; background: var(--surface); padding: 0 3px; border-radius: 3px; }
        .daylight-scale { display: flex; justify-content: space-between; font-size: 0.58rem; color: var(--faint); font-weight: 700; margin-top: 7px; }

        .golden-chip { font-size: 0.58rem; font-weight: 800; padding: 3px 9px; border-radius: 20px; background: linear-gradient(90deg, #fde68a, #fbbf24); color: #92400e; font-variant: all-small-caps; letter-spacing: 0.05em; display: inline-flex; gap: 4px; align-items: center; }
        .dwell-chip { font-size: 0.58rem; font-weight: 800; padding: 3px 9px; border-radius: 20px; background: #eef2ff; color: #4338ca; font-variant: all-small-caps; letter-spacing: 0.05em; display: inline-flex; gap: 4px; align-items: center; white-space: nowrap; }
        .pace-note { font-size: 0.86rem; color: var(--dim); background: var(--bg-2); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 11px 15px; margin-bottom: 18px; }
        .pace-note b { color: var(--ink); font-variant-numeric: tabular-nums; }
        .alert-chip { font-size: 0.58rem; font-weight: 800; padding: 3px 9px; border-radius: 20px; background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; font-variant: all-small-caps; letter-spacing: 0.05em; display: inline-flex; gap: 4px; align-items: center; white-space: nowrap; }
        .alert-note { display: flex; gap: 10px; align-items: flex-start; margin-top: 13px; padding: 11px 14px; background: #fffbeb; border: 1px solid #fde68a; border-left: 3px solid #f59e0b; border-radius: var(--radius-sm); font-size: 0.88rem; line-height: 1.5; color: #92400e; }
        .alert-note .an-ic { flex: none; line-height: 1.4; }
        .watch-card { margin-bottom: 18px; padding: 14px 16px; background: #fffbeb; border: 1px solid #fde68a; border-left: 3px solid #f59e0b; border-radius: var(--radius-sm); }
        .watch-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; color: #b45309; margin-bottom: 8px; }
        .watch-list { margin: 0; padding-left: 20px; display: flex; flex-direction: column; gap: 7px; }
        .watch-list li { font-size: 0.88rem; line-height: 1.45; color: #92400e; }
        .watch-card-lg { border-left: 3px solid #f59e0b; }
        .watch-card-lg .card-title { color: #b45309; }
        .watch-card-lg .watch-list li { color: var(--dim); }
        .foryou-pill { font-size: 0.58rem; font-weight: 800; padding: 2px 9px; border-radius: 20px; background: linear-gradient(90deg, #fbcfe8, #fde68a); color: #9d174d; font-variant: all-small-caps; letter-spacing: 0.04em; white-space: nowrap; display: inline-flex; align-items: center; }
        .sq-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 7px 0 2px; }
        .sq-chip { font-size: 0.66rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; background: var(--bg-2); color: var(--dim); white-space: nowrap; display: inline-flex; gap: 4px; align-items: center; }
        .sq-chip.light { background: #fff7ed; color: #c2410c; }
        .sq-chip.walk { background: #ecfdf5; color: #047857; }
        .sq-card.fy { border-color: #f9a8d4; box-shadow: 0 0 0 1px #fbcfe8 inset; }
        .sq-foryou-intro { display: block; margin-top: 6px; color: var(--dim); }
        .coffee-vibe { font-size: 0.86rem; line-height: 1.5; color: #9a3412; margin-top: 13px; padding: 10px 14px; background: #fff7ed; border-left: 3px solid #ea580c; border-radius: var(--radius-sm); }
        .park-chip { font-size: 0.58rem; font-weight: 800; padding: 3px 9px; border-radius: 20px; background: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe; font-variant: all-small-caps; letter-spacing: 0.05em; display: inline-flex; gap: 4px; align-items: center; white-space: nowrap; }
        .park-note { display: flex; gap: 10px; align-items: flex-start; margin-top: 13px; padding: 11px 14px; background: #eff6ff; border: 1px solid #bfdbfe; border-left: 3px solid #3b82f6; border-radius: var(--radius-sm); font-size: 0.88rem; line-height: 1.5; color: #1e40af; }
        .park-note .pn-ic { flex: none; line-height: 1.4; }
        .poi-park { font-size: 0.78rem; line-height: 1.45; color: #1e40af; margin-top: 8px; padding: 8px 11px; background: #eff6ff; border-left: 3px solid #3b82f6; border-radius: var(--radius-sm); }
        .detour-chip { font-size: 0.58rem; font-weight: 800; padding: 3px 9px; border-radius: 20px; background: #ede9fe; color: #6d28d9; font-variant: all-small-caps; letter-spacing: 0.05em; white-space: nowrap; display: inline-flex; gap: 4px; align-items: center; }
        .detour-note { font-size: 0.84rem; line-height: 1.5; color: #5b21b6; margin-top: 10px; padding: 9px 13px; background: #f5f3ff; border-left: 3px solid #8b5cf6; border-radius: var(--radius-sm); }

        /* stargazing */
        .card.stargaze { background: radial-gradient(120% 140% at 80% 0%, #1e293b, #0b1120); color: #e2e8f0; border-color: rgba(255,255,255,0.06); }
        .card.stargaze .card-title { color: #94a3b8; }
        .sg-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .sg-moon { font-size: 2.8rem; line-height: 1; filter: drop-shadow(0 2px 10px rgba(148,163,184,0.4)); }
        .sg-meta .k { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; font-weight: 800; }
        .sg-meta .v { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
        .sg-note { font-family: var(--serif); font-style: italic; color: #cbd5e1; margin-top: 14px; font-size: 1rem; line-height: 1.5; }

        /* side quests */
        .sq-intro { font-size: 0.92rem; color: var(--dim); margin-bottom: 18px; }
        .sq-card { display: flex; gap: 14px; align-items: flex-start; background: var(--surface); border: 1px solid var(--rule); border-radius: var(--radius-sm); padding: 15px 16px; box-shadow: var(--shadow-sm); margin-bottom: 12px; transition: border-color 0.16s, transform 0.16s; }
        .sq-card:hover { border-color: var(--accent); }
        .sq-ic { width: 40px; height: 40px; flex-shrink: 0; border-radius: 11px; display: grid; place-items: center; font-size: 19px; background: var(--accent-soft); }
        .sq-main { flex: 1; min-width: 0; }
        .sq-main h4 { font-size: 1rem; font-weight: 700; display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
        .sq-add { font-size: 0.62rem; font-weight: 800; color: var(--accent); background: var(--accent-soft); padding: 2px 9px; border-radius: 20px; font-variant: all-small-caps; letter-spacing: 0.04em; }
        .sq-main p { font-size: 0.88rem; color: var(--dim); margin-top: 4px; }

        /* soundtrack */
        .card.soundtrack { background: linear-gradient(135deg, #18181b, #292524); color: #e7e5e4; border-color: rgba(255,255,255,0.06); }
        .card.soundtrack .card-title { color: #a8a29e; }
        .st-vibe { font-family: var(--serif); font-style: italic; font-size: 1.06rem; color: #fafaf9; margin-bottom: 14px; line-height: 1.45; }
        .st-track { display: flex; align-items: center; gap: 11px; padding: 7px 0; font-size: 0.88rem; border-top: 1px solid rgba(255,255,255,0.07); }
        .st-track:first-of-type { border-top: none; }
        .st-track .num { color: #78716c; font-weight: 800; font-size: 0.74rem; width: 16px; }
        .st-track b { font-weight: 600; color: #fafaf9; }
        .st-track span { color: #a8a29e; }
        .st-play { display: inline-flex; align-items: center; gap: 8px; margin-top: 15px; background: #1db954; color: #fff; text-decoration: none; font-weight: 700; font-size: 0.82rem; padding: 9px 16px; border-radius: 30px; transition: transform 0.16s; }
        .st-play:hover { transform: translateY(-2px); }

        /* pre-departure / countdown */
        .countdown { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; margin-bottom: 22px; }
        .cd-num { font-size: 2.7rem; font-weight: 900; letter-spacing: -0.04em; color: var(--brand); line-height: 1; }
        .cd-num small { font-size: 0.84rem; font-weight: 700; color: var(--dim); letter-spacing: 0; }
        .cd-meta { font-size: 0.88rem; color: var(--dim); }
        .cd-meta b { color: var(--ink); }
        .prep-cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(232px, 1fr)); gap: 22px; }
        .prep-col h4 { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--faint); font-weight: 800; margin-bottom: 11px; display: flex; gap: 7px; align-items: center; }
        .prep-col .check-item { margin-bottom: 8px; }

        /* mobile nav toggle */
        .nav-toggle { display: none; }
        .scrim { display: none; }

        @media (max-width: 860px) {
            body { overflow: auto; }
            .command-bar { flex-wrap: wrap; gap: 12px; padding: 12px 16px; position: sticky; top: 0; }
            .command-spacer { display: none; }
            .progress-cluster { order: 3; width: 100%; justify-content: space-between; }
            .nav-toggle {
                display: grid; place-items: center; width: 40px; height: 40px; flex-shrink: 0;
                border-radius: 11px; border: 1px solid var(--rule-2); background: var(--surface); cursor: pointer;
            }
            .nav-toggle svg { width: 20px; height: 20px; }
            .workspace { display: block; overflow: visible; }
            .left-nav {
                position: fixed; top: 0; left: 0; bottom: 0; width: 280px; z-index: 50;
                background: var(--surface); transform: translateX(-105%); transition: transform 0.28s cubic-bezier(0.2,0.7,0.2,1);
                box-shadow: var(--shadow);
            }
            .left-nav.open { transform: none; }
            .scrim.show { display: block; position: fixed; inset: 0; background: rgba(28,25,23,0.4); z-index: 45; }
            .content-panel { padding: 18px 16px 80px; overflow: visible; height: auto; }
            .hero-grad { padding: 22px 20px; }
            .hero-stats { gap: 18px; }
            .map-widget { height: 280px; }
            .card { padding: 18px; }
            .stop-time { min-width: 64px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
        }

        /* ---------- always-on: Discover upcoming places ---------- */
        .upnext-fab { position: fixed; right: 20px; bottom: 20px; z-index: 60; display: inline-flex; align-items: center; gap: 8px; padding: 13px 18px; border: none; border-radius: 30px; background: var(--brand); color: #fff; font-family: var(--sans); font-size: 0.86rem; font-weight: 800; cursor: pointer; box-shadow: 0 8px 24px rgba(2,132,199,0.36); transition: transform 0.16s, box-shadow 0.16s; }
        .upnext-fab:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(2,132,199,0.45); }
        .upnext-fab .uf-ic { font-size: 1.05rem; line-height: 1; }
        .upnext-fab .uf-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 0 0 rgba(74,222,128,0.7); animation: ufpulse 2s infinite; }
        @keyframes ufpulse { 0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); } 70% { box-shadow: 0 0 0 7px rgba(74,222,128,0); } 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); } }
        .upnext-scrim { display: none; position: fixed; inset: 0; background: rgba(28,25,23,0.4); z-index: 65; }
        .upnext-scrim.show { display: block; }
        .upnext-drawer { position: fixed; top: 0; right: 0; height: 100%; width: 400px; max-width: 92vw; background: var(--bg); border-left: 1px solid var(--rule); box-shadow: -12px 0 40px rgba(28,25,23,0.18); z-index: 70; transform: translateX(102%); transition: transform 0.26s cubic-bezier(0.22,1,0.36,1); display: flex; flex-direction: column; }
        .upnext-drawer.open { transform: translateX(0); }
        .un-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 18px 20px 14px; border-bottom: 1px solid var(--rule); }
        .un-title { font-size: 1.02rem; font-weight: 800; color: var(--ink); }
        .un-sub { font-size: 0.78rem; color: var(--dim); margin-top: 3px; }
        .un-close { border: none; background: var(--bg-2); color: var(--dim); width: 32px; height: 32px; border-radius: 9px; cursor: pointer; font-size: 0.9rem; flex: none; }
        .un-close:hover { background: var(--rule); }
        .un-guess { margin: 14px 16px 4px; padding: 13px 15px; border-radius: var(--radius-sm); background: linear-gradient(120deg, var(--brand-wash), var(--bg-2)); border: 1px solid var(--rule); }
        .un-guess .ug-row { display: flex; align-items: baseline; gap: 8px; font-size: 0.88rem; color: var(--ink); }
        .un-guess .ug-row + .ug-row { margin-top: 7px; }
        .un-guess .ug-k { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 800; color: var(--faint); min-width: 78px; }
        .un-guess b { font-weight: 800; }
        .un-guess .ug-meta { color: var(--brand); font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
        .un-list { flex: 1; overflow-y: auto; padding: 10px 16px 16px; display: flex; flex-direction: column; gap: 10px; }
        .un-empty { font-size: 0.86rem; color: var(--dim); text-align: center; padding: 30px 12px; }
        .un-poi { display: flex; gap: 11px; padding: 11px 12px; border: 1px solid var(--rule); border-radius: var(--radius-sm); background: var(--bg-1, #fff); }
        .un-poi .up-ic { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex: none; }
        .un-poi h5 { font-size: 0.9rem; font-weight: 800; color: var(--ink); margin: 0 0 3px; }
        .un-poi .up-tags { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 5px; }
        .un-poi .up-blurb { font-size: 0.78rem; color: var(--dim); line-height: 1.4; }
        .un-dist { font-size: 0.62rem; font-weight: 800; padding: 2px 8px; border-radius: 20px; background: #e0f2fe; color: #0369a1; white-space: nowrap; font-variant-numeric: tabular-nums; }
        .un-poi .up-act { display: flex; gap: 8px; margin-top: 8px; }
        .un-foot { padding: 12px 16px 16px; border-top: 1px solid var(--rule); }
        .un-refresh { width: 100%; padding: 10px; border: 1px solid var(--rule); background: var(--bg-2); color: var(--dim); border-radius: 10px; font-weight: 700; font-size: 0.82rem; cursor: pointer; }
        .un-refresh:hover { background: var(--rule); }
        .un-foot-row { display: flex; gap: 8px; }
        .un-foot-row .un-refresh, .un-foot-row .un-scan { flex: 1; }
        .un-scan { padding: 10px; border: 1px solid var(--brand-soft, var(--rule)); background: var(--brand-wash); color: var(--brand); border-radius: 10px; font-weight: 800; font-size: 0.82rem; cursor: pointer; }
        .un-scan:hover { background: var(--brand); color: #fff; }
        .un-scan:disabled { opacity: 0.55; cursor: default; }
        .live-divider { display: flex; align-items: center; gap: 8px; margin: 8px 2px 2px; font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); }
        .live-divider::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
        .live-note { font-size: 0.76rem; color: var(--dim); line-height: 1.45; padding: 6px 2px; }
        .live-note.err { color: var(--warn, #b91c1c); }
        .src-badge { font-size: 0.58rem; font-weight: 800; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.03em; white-space: nowrap; }
        .src-badge.osm { background: rgba(126,188,111,0.20); color: #3f7e2f; }
        .src-badge.wiki { background: rgba(51,102,153,0.16); color: #2f5d8c; }
        body.unified .un-scan { background: transparent; color: var(--t-route); border-color: var(--t-route-soft); }
        body.unified .un-scan:hover { background: var(--t-route); color: #fff; }
        @media (max-width: 640px) { .upnext-fab { right: 14px; bottom: 14px; padding: 12px 15px; } .upnext-fab .uf-label { display: none; } }

        /* ============================================================
           UNIFIED DESIGN  ·  Bector house style (flag: body.unified)
           All rules scoped under body.unified \u2014 off-state is untouched.
           ============================================================ */
        .u-flag-toggle { position: fixed; bottom: 18px; left: 18px; z-index: 9000; display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%); border: 1px solid rgba(26,19,48,0.10); border-radius: 999px; font: 700 10.5px var(--u-sans); font-variant: all-small-caps; letter-spacing: 0.08em; color: var(--ink); cursor: pointer; box-shadow: 0 4px 14px rgba(26,19,48,0.08); transition: background .2s, box-shadow .2s, transform .2s, border-color .2s; }
        .u-flag-toggle:hover { background: rgba(255,255,255,0.95); box-shadow: 0 6px 18px rgba(26,19,48,0.12); transform: translateY(-1px); }
        .u-flag-toggle .u-flag-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); transition: background .2s, box-shadow .2s; }
        body.unified .u-flag-toggle { border-color: rgba(180,83,9,0.30); color: var(--u-brand); }
        body.unified .u-flag-toggle .u-flag-dot { background: var(--u-brand); box-shadow: 0 0 0 3px var(--u-brand-soft); }
        @media (prefers-reduced-motion: reduce) { body.unified .u-magnet { transform: none !important; transition: none !important; } }

        /* Up Next drawer \u2192 the one glass focus surface: glass + bento KPIs + tufte rows */
        body.unified .upnext-drawer { background: var(--u-glass-bg); backdrop-filter: var(--u-glass-blur); -webkit-backdrop-filter: var(--u-glass-blur); border-left: var(--u-glass-border); box-shadow: var(--u-glass-shadow); }
        body.unified .un-title { font-variant: all-small-caps; letter-spacing: 0.08em; font-weight: 800; color: var(--u-ink); }
        body.unified .un-sub { color: var(--u-dim); }
        /* guess block \u2192 two bento KPI tiles */
        body.unified .un-guess { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: transparent; border: none; padding: 14px 16px 6px; }
        body.unified .un-guess .ug-row { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; background: #fff; border: 1px solid var(--u-rule); border-radius: 10px; padding: 10px 12px; margin: 0; transition: box-shadow .22s, border-color .22s; }
        body.unified .un-guess .ug-row:hover { box-shadow: 0 6px 18px rgba(26,19,48,0.06); border-color: var(--u-rule-2); }
        body.unified .un-guess .ug-k { font: 700 9.5px var(--u-sans); font-variant: all-small-caps; letter-spacing: 0.06em; color: var(--u-faint); min-width: 0; }
        body.unified .un-guess b { font: 700 15px var(--u-sans); font-variant-numeric: tabular-nums; color: var(--u-ink); letter-spacing: -0.01em; }
        body.unified .un-guess .ug-meta { font: 700 11px var(--u-sans); font-variant: all-small-caps; letter-spacing: 0.05em; color: var(--u-brand); }
        /* place list \u2192 tufte rows: hairline rules, small-caps meta, brand-threaded marker */
        body.unified .un-poi { background: transparent; border: none; border-bottom: 1px solid var(--u-rule); border-radius: 0; padding: 12px 4px; transition: background .2s; }
        body.unified .un-poi:hover { background: rgba(26,19,48,0.02); }
        body.unified .un-poi h5 { font: 600 14px var(--u-sans); color: var(--u-ink); }
        body.unified .un-poi .up-blurb { color: var(--u-dim); }
        body.unified .un-dist { background: transparent; color: var(--u-ink); font-variant-numeric: tabular-nums; font-weight: 800; padding: 0; border-radius: 0; }
        body.unified .un-poi .foryou-pill { background: transparent; color: var(--u-brand); font-variant: all-small-caps; letter-spacing: 0.06em; padding: 0; }
        body.unified .un-poi .foryou-pill::before { content: '\00B7 '; color: var(--u-faint); }
        body.unified .un-poi .dwell-chip, body.unified .un-poi .park-chip, body.unified .un-poi .detour-chip { background: transparent; border: none; color: var(--u-faint); padding: 0; font-variant: all-small-caps; letter-spacing: 0.05em; }
        body.unified .un-poi .tag { background: transparent !important; color: var(--u-dim) !important; padding: 0; font-variant: all-small-caps; letter-spacing: 0.05em; }
        body.unified .un-refresh { font-variant: all-small-caps; letter-spacing: 0.06em; }

        /* ============================================================
           UNIFIED · TRAVEL  ·  the journey-centric reskin of the house style
           Route thread + boarding-pass tiles + split-flap board + passport
           stamps + topographic glass wash. Still one glass focus surface.
           ============================================================ */
        /* topographic contour wash behind the one glass surface (pure CSS contours).
           NB: .upnext-drawer is already position:fixed, which is its own positioning
           context for the absolute ::before — do NOT override position here. */
        body.unified .upnext-drawer::before {
            content: ''; position: absolute; inset: 0; z-index: 0; pointer-events: none;
            background:
                repeating-radial-gradient(circle at 84% 10%, transparent 0 17px, var(--t-contour) 17px 18px),
                repeating-radial-gradient(circle at 12% 64%, transparent 0 21px, var(--t-contour) 21px 22px),
                radial-gradient(120% 70% at 12% 0%, rgba(252,217,167,0.40), transparent 56%),
                radial-gradient(110% 60% at 92% 26%, rgba(199,210,254,0.26), transparent 56%);
        }
        body.unified .un-head, body.unified .un-guess, body.unified .un-list, body.unified .un-foot { position: relative; z-index: 1; }
        body.unified .un-title::before { content: '\2708\FE0F  '; }

        /* guess tiles → boarding-pass stubs with a split-flap departure board for the distance */
        body.unified .un-guess .ug-row { background: var(--t-paper); border-top: 3px solid var(--t-route); border-radius: 4px 4px 10px 10px; }
        body.unified .un-guess .ug-row::after { content: ''; position: absolute; right: 9px; top: 10px; bottom: 10px; border-left: 1.5px dashed var(--t-route-soft); }
        body.unified .un-guess .ug-meta { background: var(--t-board-bg); color: var(--t-board-ink); padding: 2px 8px; border-radius: 5px; font-variant-numeric: tabular-nums; letter-spacing: 0.03em; box-shadow: inset 0 -6px 0 rgba(0,0,0,0.18); }

        /* place list → a dotted route, the place icons are the stops on the line */
        body.unified .un-list { position: relative; }
        body.unified .un-list::before { content: ''; position: absolute; top: 22px; bottom: 22px; left: 37px; border-left: 2px dotted var(--t-route-soft); z-index: 0; }
        body.unified .un-poi { padding: 12px 4px; }
        body.unified .un-poi .up-ic { position: relative; z-index: 1; border: 2px solid var(--t-route); box-shadow: 0 0 0 4px var(--u-glass-bg); }
        /* distance → small split-flap board chip */
        body.unified .un-dist { background: var(--t-board-bg); color: var(--t-board-ink); padding: 2px 7px; border-radius: 4px; font-variant-numeric: tabular-nums; font-weight: 800; box-shadow: inset 0 -5px 0 rgba(0,0,0,0.18); }
        /* "your vibe" → a tilted passport stamp */
        body.unified .un-poi .foryou-pill { transform: rotate(-3.5deg); border: 1.5px dashed var(--t-stamp); color: var(--t-stamp); background: transparent; padding: 1px 6px; border-radius: 3px; font-variant: all-small-caps; letter-spacing: 0.08em; font-weight: 800; }
        body.unified .un-poi .foryou-pill::before { content: none; }
        /* the human voice → serif journal note for the end-of-route state */
        body.unified .un-empty { font-family: var(--u-serif); font-style: italic; color: var(--u-dim); }
        /* refresh → a ticket-stub CTA */
        body.unified .un-refresh { background: var(--t-route); color: #fff; border: none; border-radius: 8px; }
        body.unified .un-refresh:hover { background: #9a4708; }

        /* ---- save / sync / share control ---- */
        .sync-wrap { position: relative; }
        .sync-btn { display: inline-flex; align-items: center; gap: 7px; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rule, #cbd5e1); transition: background .2s; flex: none; }
        .sync-dot.on { background: #16a34a; }
        .sync-dot.busy { background: #d97706; animation: syncPulse 1s ease-in-out infinite; }
        .sync-dot.err { background: #dc2626; }
        @keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:.3} }
        .sync-menu { position: absolute; right: 0; top: calc(100% + 9px); width: 256px; background: #fff; border: 1px solid var(--rule, #e5e7eb); border-radius: 13px; box-shadow: 0 20px 50px rgba(15,23,42,0.20); padding: 7px; z-index: 80; }
        .sync-menu[hidden] { display: none; }
        .sync-sec { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted, #94a3b8); padding: 8px 8px 4px; }
        .sync-item { display: block; width: 100%; text-align: left; background: none; border: 0; border-radius: 9px; padding: 9px 9px; font: inherit; font-size: 13px; color: var(--ink, #0f172a); cursor: pointer; }
        .sync-item:hover { background: rgba(180,83,9,0.09); }
        .sync-note { font-size: 11px; color: var(--muted, #94a3b8); padding: 7px 9px 4px; line-height: 1.45; }
        /* unified · travel skin: the sync menu joins the one glass-surface family */
        body.unified .sync-menu { background: var(--u-glass-bg, rgba(255,255,255,0.86)); -webkit-backdrop-filter: blur(16px) saturate(1.5); backdrop-filter: blur(16px) saturate(1.5); border-color: var(--t-route-soft); }
        body.unified .sync-item { font-variant-numeric: tabular-nums; }
        body.unified .sync-item:hover { background: var(--t-route-soft); }
        body.unified .sync-sec { color: var(--t-route); }
    </style>
</head>
<body>

    <header class="command-bar">
        <button class="nav-toggle" id="navToggle" aria-label="Toggle legs menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round"/></svg>
        </button>
        <div class="brand-mark">
            <div class="compass" id="compass">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2 5-5 2 2-5z" fill="currentColor" stroke="none"/></svg>
            </div>
            <div class="brand-text">
                <h1>Mountain&nbsp;→&nbsp;Coast Expedition</h1>
                <p>Colorado Springs to La Jolla · 4 days · 1,155 mi</p>
            </div>
        </div>

        <div class="command-spacer"></div>

        <div class="date-control">
            <label for="tripStart">Departure</label>
            <input type="date" id="tripStart" value="2026-06-13">
        </div>

        <div class="date-control">
            <label for="sdNights">Nights in San Diego</label>
            <input type="number" id="sdNights" min="0" max="21" value="1">
        </div>

        <div class="progress-cluster">
            <div class="ring-wrap">
                <svg width="46" height="46" viewBox="0 0 46 46">
                    <circle cx="23" cy="23" r="19" fill="none" stroke="var(--rule)" stroke-width="5"/>
                    <circle id="progressRing" cx="23" cy="23" r="19" fill="none" stroke="var(--brand)" stroke-width="5" stroke-linecap="round" stroke-dasharray="119.4" stroke-dashoffset="119.4"/>
                </svg>
                <div class="ring-label" id="progressPct">0%</div>
            </div>
            <div class="progress-meta">
                <div class="k">Expedition progress</div>
                <div class="v" id="progressText">0 of 30 stops logged</div>
            </div>
            <div class="sync-wrap" id="syncWrap">
                <button class="ghost-btn sync-btn" id="syncBtn" aria-haspopup="true" aria-expanded="false" title="Save, sync & share">
                    <span class="sync-dot" id="syncDot"></span><span id="syncLabel">Save</span>
                </button>
                <div class="sync-menu" id="syncMenu" role="menu" hidden>
                    <div class="sync-sec">This device</div>
                    <button class="sync-item" id="syncExport" role="menuitem">⬇️&nbsp;&nbsp;Download backup (.json)</button>
                    <button class="sync-item" id="syncImport" role="menuitem">⬆️&nbsp;&nbsp;Restore from file…</button>
                    <button class="sync-item" id="syncShare" role="menuitem">🔗&nbsp;&nbsp;Copy share link</button>
                    <div class="sync-sec">Google Drive</div>
                    <button class="sync-item" id="syncDrive" role="menuitem">☁️&nbsp;&nbsp;Sign in to sync</button>
                    <div class="sync-note" id="syncNote">Saved only in this browser until you connect Drive.</div>
                </div>

    function dayOffset(d){
        if(d.seg !== 'ret') return d.n - 1;                       // outbound: day 1 = offset 0
        const outCount = TRIP.days.filter(x=>x.seg !== 'ret').length;
        const retIdx = TRIP.days.filter(x=>x.seg === 'ret').indexOf(d);

    // Classic almanac sunrise/sunset for an arbitrary solar-depression zenith.
    function _solarEvent(date, lat, lng, zenith, rising){
        const rad = Math.PI/180, deg = 180/Math.PI;
        const start = Date.UTC(date.getFullYear(), 0, 0);
        const N = Math.floor((Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) - start) / 86400000);
        const lngHour = lng / 15;
        const t = rising ? N + (6 - lngHour)/24 : N + (18 - lngHour)/24;
        const M = (0.9856 * t) - 3.289;
        let L = M + (1.916*Math.sin(M*rad)) + (0.020*Math.sin(2*M*rad)) + 282.634;
        L = ((L % 360) + 360) % 360;
        let RA = deg * Math.atan(0.91764 * Math.tan(L*rad));
        RA = ((RA % 360) + 360) % 360;
        RA += (Math.floor(L/90)*90) - (Math.floor(RA/90)*90);
        RA /= 15;
        const sinDec = 0.39782 * Math.sin(L*rad);
        const cosDec = Math.cos(Math.asin(sinDec));
        const cosH = (Math.cos(zenith*rad) - (sinDec * Math.sin(lat*rad))) / (cosDec * Math.cos(lat*rad));
        if(cosH > 1 || cosH < -1) return null;
        let H = rising ? 360 - deg*Math.acos(cosH) : deg*Math.acos(cosH);
        H /= 15;
        const T = H + RA - (0.06571 * t) - 6.622;
        let UT = ((T - lngHour) % 24 + 24) % 24;
        return UT * 60; // minutes from UTC midnight
    }
    function sunCalc(date, lat, lng, tz){
        const loc = (z, r) => { const u = _solarEvent(date, lat, lng, z, r); return u == null ? null : ((u + tz*60) % 1440 + 1440) % 1440; };
        const sunrise = loc(90.833, true), sunset = loc(90.833, false);
        return {
            dawn: loc(96, true), sunrise, goldenAMend: loc(84, true),
            solarNoon: (sunrise != null && sunset != null) ? (sunrise + sunset)/2 : null,
            goldenPMstart: loc(84, false), sunset, dusk: loc(96, false),
            daylight: (sunrise != null && sunset != null) ? (sunset - sunrise) : null
        };
    }
    function fmtClock(min){
        if(min == null) return '\u2014';
        min = Math.round(min);
        let h = Math.floor(min/60) % 24, m = ((min % 60) + 60) % 60;
        const ap = h >= 12 ? 'PM' : 'AM'; let hh = h % 12; if(hh === 0) hh = 12;
        return hh + ':' + String(m).padStart(2,'0') + ap.toLowerCase();
    }
    function moonInfo(date){
        const synodic = 29.530588853;
        const ref = Date.UTC(2000, 0, 6, 18, 14, 0);
        let phase = (((date.getTime() - ref) / 86400000) % synodic) / synodic;
        phase = ((phase % 1) + 1) % 1;
        const illum = Math.round((1 - Math.cos(2*Math.PI*phase)) / 2 * 100);
        const names = ['New moon','Waxing crescent','First quarter','Waxing gibbous','Full moon','Waning gibbous','Last quarter','Waning crescent'];
        const emojis = ['\uD83C\uDF11','\uD83C\uDF12','\uD83C\uDF13','\uD83C\uDF14','\uD83C\uDF15','\uD83C\uDF16','\uD83C\uDF17','\uD83C\uDF18'];
        const idx = Math.round(phase*8) % 8;
        return { phase, illum, name: names[idx], emoji: emojis[idx] };
    }
    function stargazeQuality(illum){
        if(illum <= 15) return { word:'Exceptional', note:'A near-moonless sky \u2014 the Milky Way core will blaze. Bring the tripod and shoot wide and long.' };
        if(illum <= 40) return { word:'Very good', note:'A thin moon means the galactic band is still easy to see once your eyes adapt.' };
        if(illum <= 70) return { word:'Moderate', note:'Moonlight washes the faintest stars, but constellations and planets pop. Great for moonlit landscapes.' };
        return { word:'Bright moon', note:'A near-full moon floods the desert in silver light \u2014 trade Milky Way shots for luminous moonlit terrain.' };
    }

    /* ---------- detour estimator: how far a place sits off the planned drive ----------
       Measures perpendicular distance to the actual route POLYLINE (the day's waypoint
       corridor), not the sparse stop list — otherwise an on-route place that happens to
       sit far from the nearest *stop* (e.g. Glenwood Canyon between CO Springs & Moab)
       gets a huge phantom detour. */
    const DETOUR_MPH = 45, DETOUR_ROAD_FACTOR = 1.35;
    // planar point-to-segment distance in miles (equirectangular approx; accurate at these scales)
    function pointToSegMi(plat, plng, alat, alng, blat, blng){
        const latRef = toRad((alat + blat) / 2);
        const kLat = 69.0, kLng = 69.0 * Math.cos(latRef);
        const bx = (blng - alng) * kLng, by = (blat - alat) * kLat;
        const px = (plng - alng) * kLng, py = (plat - alat) * kLat;
        const len2 = bx*bx + by*by;
        let t = len2 > 0 ? (px*bx + py*by) / len2 : 0;
        t = Math.max(0, Math.min(1, t));
        const cx = t*bx, cy = t*by;
        return Math.hypot(px - cx, py - cy);
    }
    function distToPolylineMi(lat, lng, pts){
        if(!pts || !pts.length) return Infinity;
        if(pts.length === 1) return haversineMi(lat, lng, pts[0][0], pts[0][1]);
        let best = Infinity;
        for(let i = 0; i < pts.length - 1; i++){
            const d = pointToSegMi(lat, lng, pts[i][0], pts[i][1], pts[i+1][0], pts[i+1][1]);
            if(d < best) best = d;
        }
        return best;
    }
    function detourFor(lat, lng, dayId){
        if(typeof lat !== 'number' || typeof lng !== 'number') return null;
        let off = Infinity;
        const d = TRIP.days.find(x=> x.id === dayId);
        if(d && d.waypoints && d.waypoints.length){
            off = distToPolylineMi(lat, lng, d.waypoints);
        } else {
            TRIP.days.forEach(x=>{ const o = distToPolylineMi(lat, lng, x.waypoints); if(o < off) off = o; });
        }
        if(!isFinite(off)) return null;
        const driveMin = Math.round(off * DETOUR_ROAD_FACTOR / DETOUR_MPH * 60) * 2; // out-and-back
        return { off, driveMin };
    }
    // Returns a detour callout only when the place is genuinely off the line (not basically on-route).
    function detourNoteFor(lat, lng, dayId, dwellMin){
        const e = detourFor(lat, lng, dayId);
        if(!e || e.off < 1.5 || e.driveMin < 4) return null;
        return { slight: e.off <= 20, drive: e.driveMin, total: e.driveMin + (dwellMin || 0), off: e.off };
    }

    /* ---------- SVG charts ---------- */
    function areaChart(points, w, h, color, opts){
        opts = opts || {};
        const pad = opts.pad || 3;
        const min = Math.min.apply(null, points), max = Math.max.apply(null, points);
        const range = (max - min) || 1;
        const step = w / (points.length - 1);
        const xy = points.map((p,i)=>[ i*step, h - pad - ((p-min)/range)*(h-pad*2) ]);
        const line = xy.map((p,i)=> (i?'L':'M') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
        const area = line + ' L' + w + ' ' + h + ' L0 ' + h + ' Z';
        const gid = 'g' + Math.random().toString(36).slice(2,8);
        const last = xy[xy.length-1];
        return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'
            + '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'
            + '<stop offset="0%" stop-color="'+color+'" stop-opacity="0.32"/>'
            + '<stop offset="100%" stop-color="'+color+'" stop-opacity="0.02"/></linearGradient></defs>'
            + '<path d="'+area+'" fill="url(#'+gid+')"/>'
            + '<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="'+(opts.sw||2)+'" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>'
            + (opts.dot===false ? '' : '<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="'+(opts.r||2.4)+'" fill="'+color+'"/>')
            + '</svg>';
    }

        }
        return '<svg class="hero-topo" viewBox="0 0 960 120" preserveAspectRatio="none">'+paths+'</svg>';
    }
